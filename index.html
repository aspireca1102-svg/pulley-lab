// ═══════════════════════════════════════════════
// DualPulleyMode — Method A/B 双滑轮模式
// ═══════════════════════════════════════════════

class DualPulleyMode extends PulleyMode {
  // ── 状态字段 ──
  targetEndX = SCALE_BASE_X;
  targetEndY = SCALE_BASE_Y;
  currentEndX = SCALE_BASE_X;
  currentEndY = SCALE_BASE_Y;
  prevMy = MBASE_Y;
  prevMx = FX;
  mx = FX;
  mxVel = 0;
  scaleRot = 0;
  moveRot = 0;
  anchorAnimVisible = true;
  currentMy = MBASE_Y;
  currentTension = 0;
  wrapping = true;
  ROPE_TOTAL_B = 0;
  transitLsum = 0;
  ROPE_TOTAL = 0; // Method A total rope length

  enter() {
    // ── 重置所有状态字段 ──
    this.targetEndX = SCALE_BASE_X;
    this.targetEndY = SCALE_BASE_Y;
    this.currentEndX = SCALE_BASE_X;
    this.currentEndY = SCALE_BASE_Y;
    this.prevMy = MBASE_Y;
    this.prevMx = FX;
    this.mx = FX;
    this.mxVel = 0;
    this.scaleRot = 0;
    this.moveRot = 0;
    this.anchorAnimVisible = true;
    this.currentMy = MBASE_Y;
    this.currentTension = 0;
    this.wrapping = true;
    this.ROPE_TOTAL_B = 0;
    this.transitLsum = 0;
    this.ROPE_TOTAL = 0;

    if (shared.routingMode === MODE.METHOD_B) {
      // ── Method B 初始化 ──
      this.mx = FX;
      this.prevMy = MBASE_Y;

      this.targetEndX = FX + FR + 10;
      this.targetEndY = FY + 50;
      this.currentEndX = this.targetEndX;
      this.currentEndY = this.targetEndY;

      // 初始求解：绳长约束 + 水平力平衡 → (mx, my)
      {
        const ex = this.currentEndX, ey = this.currentEndY;
        const d5i = Math.hypot(ex - FX, ey - FY);
        let fixedArc = Math.PI;
        if (d5i > FR) {
          const a5i = Math.atan2(ey - FY, ex - FX);
          const b5i = Math.acos(FR / d5i);
          let la = a5i - b5i;
          if (la < Math.PI) la += 2 * Math.PI;
          fixedArc = la - Math.PI;
        }

        // 第一轮：mx=FX 时解 my 并记录总绳长
        let m = this.prevMy;
        for (let i = 0; i < 10; i++) {
          const l1b = L1_B(this.mx, m);
          const l3 = L3(this.mx, m);
          const l5b = L5_B(ex, ey);
          const arcM = movableArcB(this.mx, m);
          const f = l1b + MR * arcM + l3 + FR * fixedArc + l5b;
          if (i === 0) this.ROPE_TOTAL_B = f;
          const err = f - this.ROPE_TOTAL_B;
          if (Math.abs(err) < 0.05) break;
          const d = Math.hypot(FX - this.mx, AY_B - m);
          const dl1b = d > MR ? -(AY_B - m) / l1b : 0;
          const da_dm = (FX - this.mx) / (d * d);
          const db_dm = MR * (AY_B - m) / (d * d * Math.max(l1b, 0.1));
          const darc_dm = -(da_dm + db_dm);
          const dl3 = l3 > 0.1 ? (m - FY) / l3 : 0;
          const df = dl1b + MR * darc_dm + dl3;
          if (Math.abs(df) < 1e-7) break;
          m = m - err / df;
        }
        this.currentMy = m;

        // 力平衡迭代辅助：给定 mx 解 my
        const solveMy_B = (xm, ym0) => {
          let mm = ym0;
          for (let j = 0; j < 6; j++) {
            const l1b2 = L1_B(xm, mm);
            const l32 = L3(xm, mm);
            const l5b2 = L5_B(ex, ey);
            const arcM2 = movableArcB(xm, mm);
            const f2 = l1b2 + MR * arcM2 + l32 + FR * fixedArc + l5b2 - this.ROPE_TOTAL_B;
            if (Math.abs(f2) < 0.05) break;
            const d2 = Math.hypot(FX - xm, AY_B - mm);
            const dl1 = d2 > MR ? -(AY_B - mm) / l1b2 : 0;
            const da = (FX - xm) / (d2 * d2);
            const db = MR * (AY_B - mm) / (d2 * d2 * Math.max(l1b2, 0.1));
            const darc = -(da + db);
            const dl3 = l32 > 0.1 ? (mm - FY) / l32 : 0;
            const df = dl1 + MR * darc + dl3;
            if (Math.abs(df) < 1e-7) break;
            mm = mm - f2 / df;
          }
          return isNaN(mm) ? ym0 : mm;
        };

        // 力平衡迭代：mx ↔ my
        for (let iter = 0; iter < 10; iter++) {
          const t1 = pulleyTangent(this.mx, this.currentMy, MR, FX, AY_B);
          const txR = t1.len > 0 ? t1.tx : this.mx + MR;
          const l1h = t1.len > 0 ? t1.len : Math.max(t1.d - MR, 0.1);
          const l3h = Math.max(L3(this.mx, this.currentMy), 0.1);
          const hRes = (FX - txR) / l1h + (FX - this.mx) / l3h;
          if (Math.abs(hRes) < 0.001) break;
          this.mx = Math.max(FX - 160, Math.min(FX + FR - 8, this.mx + hRes * 1.5));
          this.currentMy = solveMy_B(this.mx, this.currentMy);
        }

        // 第三轮：增加绳长使重物底端接近地面
        {
          const wScale = Math.sqrt(shared.weightGravity / 10);
          const wBot = this.currentMy + MR + 24 + 44 * wScale;
          const targetBot = GROUND_Y - 10;
          if (wBot < targetBot) {
            const d1h = Math.hypot(FX - this.mx, AY_B - this.currentMy);
            const cosL1 = d1h > 0.1 ? (this.currentMy - AY_B) / d1h : 0.7;
            const l3h = Math.max(L3(this.mx, this.currentMy), 0.1);
            const cosL3 = l3h > 0.1 ? (this.currentMy - FY) / l3h : 0.7;
            const ropePerDy = cosL1 + cosL3;
            this.ROPE_TOTAL_B += (targetBot - wBot) * ropePerDy;

            this.currentMy = solveMy_B(this.mx, this.currentMy);
            for (let fi = 0; fi < 4; fi++) {
              const t1f = pulleyTangent(this.mx, this.currentMy, MR, FX, AY_B);
              const txRf = t1f.len > 0 ? t1f.tx : this.mx + MR;
              const l1f = t1f.len > 0 ? t1f.len : Math.max(t1f.d - MR, 0.1);
              const l3f = Math.max(L3(this.mx, this.currentMy), 0.1);
              const hR = (FX - txRf) / l1f + (FX - this.mx) / l3f;
              if (Math.abs(hR) < 0.002) break;
              this.mx = Math.max(FX - 160, Math.min(FX + FR - 8, this.mx + hR * 1.0));
              this.currentMy = solveMy_B(this.mx, this.currentMy);
            }
          }
        }

        this.prevMy = this.currentMy;
        this.mxVel = 0;
      }

      this.wrapping = true;
    } else {
      // ── Method A 初始化 ──
      this.targetEndX = SCALE_BASE_X;
      this.targetEndY = SCALE_BASE_Y;
      this.currentEndX = this.targetEndX;
      this.currentEndY = this.targetEndY;
      this.mx = FX;
      this.mxVel = 0;
      this.prevMy = MBASE_Y;
      this.currentMy = MBASE_Y;
      this.scaleRot = 0;
      this.moveRot = 0;
      this.wrapping = true;

      // 计算 ROPE_TOTAL（旧绳端位置 655,150）
      const l1_0 = L1(FX, MBASE_Y);
      const l3_0 = L3(FX, MBASE_Y);
      const L5_OLD = L5(FX, MBASE_Y, 655, 150);
      const ARC_OLD = wrapAngle(FX, MBASE_Y, 655, 150);
      this.ROPE_TOTAL = l1_0 + l3_0 + L5_OLD + MR * ARC_OLD;

      // 水平力平衡初始求解 mx
      for (let iter = 0; iter < 6; iter++) {
        const l1 = Math.max(L1(this.mx, this.currentMy), 0.1);
        const l3 = Math.max(L3(this.mx, this.currentMy), 0.1);
        const h5 = pulleyTangent(this.mx, this.currentMy, MR, this.targetEndX, this.targetEndY).hComp;
        const hRes = (FX + FR - this.mx) / l1 + (FX - this.mx) / l3 + h5;
        if (Math.abs(hRes) < 0.002) break;
        this.mx = Math.max(FX - 80, Math.min(FX + FR, this.mx + hRes * 1.5));
      }
    }
  }

  frame(ctx) {
    // ── smooth follow 绳端位置 ──
    const lerp = 0.22;
    this.currentEndX += (this.targetEndX - this.currentEndX) * lerp;
    this.currentEndY += (this.targetEndY - this.currentEndY) * lerp;
    if (Math.abs(this.targetEndX - this.currentEndX) < 0.1) this.currentEndX = this.targetEndX;
    if (Math.abs(this.targetEndY - this.currentEndY) < 0.1) this.currentEndY = this.targetEndY;

    const clampMy = (m) => Math.max(FY + FR + MR + 20, Math.min(DESIGN_H - 90, m));
    const ex = this.currentEndX, ey = this.currentEndY;

    // ── 脱离判断 ──
    const leftLower = ex < this.mx && ey > this.prevMy;
    if (shared.routingMode === MODE.METHOD_A) {
      const flt2 = FX - FR;
      const ddxL = ex - flt2, ddyL = ey - FY;
      const denL = Math.hypot(ddxL, ddyL);
      let touchesPulley = false;
      if (denL > 1) {
        const t = ((this.mx - flt2) * ddxL + (this.prevMy - FY) * ddyL) / (denL * denL);
        if (t >= 0 && t <= 1) {
          const projX = flt2 + t * ddxL;
          const projY = FY + t * ddyL;
          touchesPulley = Math.hypot(this.mx - projX, this.prevMy - projY) <= MR;
        }
      }
      if (this.wrapping && leftLower) {
        this.wrapping = false;
        this.transitLsum = L1(this.mx, this.prevMy) + denL;
      }
      if (!this.wrapping && touchesPulley) {
        this.wrapping = true;
        this.transitLsum = 0;
      }
    } else {
      this.wrapping = true;
    }

    // ── 水平动力学 ──
    if (shared.routingMode === MODE.METHOD_A) {
      const clampMX_A = (x) => Math.max(FX - 80, Math.min(FX + FR, x));
      if (this.wrapping) {
        const l1 = Math.max(L1(this.mx, this.prevMy), 0.1);
        const l3 = Math.max(L3(this.mx, this.prevMy), 0.1);
        const h5comp = pulleyTangent(this.mx, this.prevMy, MR, ex, ey).hComp;
        const hRes = (FX + FR - this.mx) / l1 + (FX - this.mx) / l3 + h5comp;
        this.mxVel = this.mxVel * 0.82 + hRes * 0.28;
        this.mxVel = Math.max(-5, Math.min(5, this.mxVel));
        this.mx = clampMX_A(this.mx + this.mxVel);
      } else {
        const l1 = Math.max(L1(this.mx, this.prevMy), 0.1);
        const hRes = (FX + FR - this.mx) / l1;
        this.mxVel = this.mxVel * 0.82 + hRes * 0.28;
        this.mxVel = Math.max(-5, Math.min(5, this.mxVel));
        this.mx = clampMX_A(this.mx + this.mxVel);
      }
      if (isNaN(this.mx)) this.mx = FX;
    } else {
      // Method B：水平力平衡
      const clampMX = (x) => Math.max(FX - 160, Math.min(FX + FR - 8, x));
      const t1b = pulleyTangent(this.mx, this.prevMy, MR, FX, AY_B);
      const txR = t1b.len > 0 ? t1b.tx : this.mx + MR;
      const l1bVal = t1b.len > 0 ? t1b.len : Math.max(t1b.d - MR, 0.1);
      const l3Val = Math.max(L3(this.mx, this.prevMy), 0.1);
      const hRes = (FX - txR) / l1bVal + (FX - this.mx) / l3Val;
      this.mxVel = this.mxVel * 0.80 + hRes * 0.35;
      this.mxVel = Math.max(-6, Math.min(6, this.mxVel));
      this.mx = clampMX(this.mx + this.mxVel);
      if (isNaN(this.mx)) this.mx = FX;
    }

    // ── Newton 求解 my ──
    let my;
    if (shared.routingMode === MODE.METHOD_A) {
      if (this.wrapping) {
        const target = this.ROPE_TOTAL;
        let m = this.prevMy;
        for (let i = 0; i < 6; i++) {
          const l1 = L1(this.mx, m);
          const l3 = L3(this.mx, m);
          const l5 = L5(this.mx, m, ex, ey);
          const distArc = Math.hypot(ex - this.mx, ey - m);
          let arc = Math.PI, dArc = 0;
          if (distArc > MR) {
            const aa = Math.atan2(ey - m, ex - this.mx);
            const bb = Math.acos(MR / distArc);
            arc = Math.PI - (aa + bb);
            if (arc <= 0) arc += 2 * Math.PI;
            dArc = (ex - this.mx) / (distArc * distArc) + MR * (ey - m) / (distArc * distArc * Math.max(l5, 0.1));
          }
          const f = l1 + l3 + l5 + MR * arc - target;
          if (Math.abs(f) < 0.05) break;
          const dl1 = (m - MR - 27 - FY) / Math.max(l1, 0.1);
          const dl3 = l3 > 0.1 ? (m - FY) / l3 : 0;
          const dl5 = l5 > 0.1 ? -(ey - m) / l5 : 0;
          const df = dl1 + dl3 + dl5 + MR * dArc;
          if (Math.abs(df) < 1e-7) break;
          m = clampMy(m - f / df);
        }
        my = m;
        if (isNaN(my)) my = this.prevMy;
        this.scaleRot += 2 * (my - this.prevMy) / FR;
        this.moveRot += 2 * (my - this.prevMy) / MR;
      } else {
        const target = this.transitLsum;
        let m = this.prevMy;
        const Ldirect = Math.hypot(ex - (FX - FR), ey - FY);
        for (let i = 0; i < 5; i++) {
          const l1 = L1(this.mx, m);
          const f = l1 + Ldirect - target;
          if (Math.abs(f) < 0.05) break;
          const df = (m - MR - 27 - FY) / Math.max(l1, 0.1);
          if (Math.abs(df) < 1e-7) break;
          m = clampMy(m - f / df);
        }
        my = m;
        if (isNaN(my)) my = this.prevMy;
        this.scaleRot += (my - this.prevMy) / FR;
        this.moveRot = 0;
      }
    } else {
      // Method B
      const target = this.ROPE_TOTAL_B;
      const d5 = Math.hypot(ex - FX, ey - FY);
      let fixedArc = Math.PI;
      if (d5 > FR) {
        const a5 = Math.atan2(ey - FY, ex - FX);
        const b5 = Math.acos(FR / d5);
        let leaveA = a5 - b5;
        if (leaveA < Math.PI) leaveA += 2 * Math.PI;
        fixedArc = leaveA - Math.PI;
      }
      let m = this.prevMy;
      for (let i = 0; i < 6; i++) {
        const l1b = L1_B(this.mx, m);
        const l3 = L3(this.mx, m);
        const l5b = L5_B(ex, ey);
        const arcM = movableArcB(this.mx, m);
        const f = l1b + MR * arcM + l3 + FR * fixedArc + l5b - target;
        if (Math.abs(f) < 0.05) break;
        const d1b = Math.hypot(FX - this.mx, AY_B - m);
        const dl1b = d1b > MR ? -(AY_B - m) / l1b : 0;
        const da_dm = (FX - this.mx) / (d1b * d1b);
        const db_dm = MR * (AY_B - m) / (d1b * d1b * Math.max(l1b, 0.1));
        const darc_dm = -(da_dm + db_dm);
        const dl3 = l3 > 0.1 ? (m - FY) / l3 : 0;
        const df = dl1b + MR * darc_dm + dl3;
        if (Math.abs(df) < 1e-7) break;
        m = clampMy(m - f / df);
      }
      my = m;
      if (isNaN(my)) my = this.prevMy;
      this.scaleRot += 2 * (my - this.prevMy) / FR;
      this.moveRot += 2 * (my - this.prevMy) / MR;
      this.wrapping = true;
    }
    this.prevMy = my;
    this.prevMx = this.mx;
    this.currentMy = my;

    // ── Canvas 渲染 ──
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const { s, ox, oy } = getTransform();
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(s, s);

    // 背景
    ctx.fillStyle = '#faf9f6';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    // 地面参考线
    drawGroundLine(ctx, GROUND_Y);

    // 标定虚线
    drawCalibrationLines(ctx, shared.calibrated, this.mx, this.currentEndX, this.currentEndY);

    // 绳索
    drawRope(ctx, shared.routingMode, FX, FY, this.mx, my, this.currentEndX, this.currentEndY, this.wrapping);

    // 支撑
    drawSupport(ctx);

    // 定滑轮
    drawPulley(ctx, FX, FY, FR, this.scaleRot);

    // 动滑轮
    drawPulley(ctx, this.mx, my, MR, this.moveRot);

    // 重物
    drawWeight(ctx, this.mx, my, shared.weightGravity);

    // 绳端拖拽手柄
    drawRopeEndHandle(ctx, this.currentEndX, this.currentEndY);

    // 拉力显示
    const totalG = shared.weightGravity + shared.pulleyGravity;
    const eta = Math.max(1 - shared.friction, 0.01);
    if (shared.routingMode === MODE.METHOD_A) {
      if (this.wrapping) {
        const l1t = L1(this.mx, my);
        const l3t = L3(this.mx, my);
        const cos1 = (my - MR - 27 - FY) / l1t;
        const cos3 = (my - FY) / l3t;
        let cos5 = 0;
        const t5 = pulleyTangent(this.mx, my, MR, this.currentEndX, this.currentEndY);
        if (t5.len > 0) {
          cos5 = (t5.ty - this.currentEndY) / Math.max(t5.len, 0.1);
        }
        const totalCos = Math.max(cos1 + cos3 + cos5, 0.5);
        this.currentTension = totalG / totalCos / eta;
      } else {
        this.currentTension = totalG / eta;
      }
    } else {
      const d1t = Math.hypot(FX - this.mx, AY_B - my);
      const cos1 = d1t > 0.1 ? (my - AY_B) / d1t : 0;
      const cos3 = L3(this.mx, my) > 0.1 ? (my - FY) / L3(this.mx, my) : 0;
      const totalCos = Math.max(cos1 + cos3, 0.5);
      this.currentTension = totalG / totalCos / eta;
    }
    if (shared.dragging) {
      drawTensionLabel(ctx, this.currentTension, this.currentEndX, this.currentEndY);
    }

    ctx.restore();
  }

  onDown(mxd, myd) {
    shared.anchorAnimVisible = false;
    // mxd/myd 现为设计坐标
    const dist = Math.hypot(mxd - this.currentEndX, myd - this.currentEndY);
    if (dist > 28) return;
    shared.dragging = true;
    shared.dragStartMouseX = mxd;
    shared.dragStartMouseY = myd;
    shared.dragStartEndX = this.currentEndX;
    shared.dragStartEndY = this.currentEndY;
  }

  onMove(mxd, myd) {
    if (!shared.dragging) return;
    let ex = shared.dragStartEndX + (mxd - shared.dragStartMouseX);
    let ey = shared.dragStartEndY + (myd - shared.dragStartMouseY);
    ex = Math.max(40, Math.min(DESIGN_W - 40, ex));
    ey = Math.max(30, Math.min(DESIGN_H - 40, ey));
    // Method B: clamp distance from FX/FY
    if (shared.routingMode === MODE.METHOD_B) {
      const fdx = ex - FX, fdy = ey - FY;
      const fdist = Math.hypot(fdx, fdy);
      if (fdist < FR + 4) {
        ex = FX + fdx * (FR + 4) / Math.max(fdist, 0.01);
        ey = FY + fdy * (FR + 4) / Math.max(fdist, 0.01);
      }
    } else {
      // Method A: clamp distance from mx/prevMy
      let pdx = ex - this.mx, pdy = ey - this.prevMy;
      let pdist = Math.hypot(pdx, pdy);
      if (pdist < MR + 2) {
        ex = this.mx + pdx * (MR + 2) / Math.max(pdist, 0.01);
        ey = this.prevMy + pdy * (MR + 2) / Math.max(pdist, 0.01);
      }
      if (this.wrapping) {
        const t = pulleyTangent(this.mx, this.prevMy, MR, ex, ey);
        if (t.len > 0 && ey < t.ty) {
          const cone = t.ty - ey;
          ex = Math.max(t.tx - cone, ex);
        }
      }
    }
    this.targetEndX = ex;
    this.targetEndY = ey;
  }

  onUp() {
    shared.dragging = false;
  }

  getCalibrationData() {
    const wH = heightM(this.currentMy);
    const rH = heightM(this.currentEndY);
    let rLen;
    if (shared.routingMode === MODE.METHOD_A) {
      rLen = this.wrapping ? L5(this.mx, this.currentMy, this.currentEndX, this.currentEndY) : null;
    } else {
      rLen = L5_B(this.currentEndX, this.currentEndY);
    }
    return { wH, rH, rLen, ex: this.currentEndX, ey: this.currentEndY, tension: this.currentTension };
  }
}

// ══ modes/mode-practice.js ══

// ═══════════════════════════════════════════════
// PracticeMode — 练习模式：双滑轮自由绕绳
// ═══════════════════════════════════════════════

class PracticeMode extends PulleyMode {
  selected = null;          // {x, y}
  anchorId = -1;            // 0-3
  mouseX = 0;
  mouseY = 0;
  path = [];
  ropeLen = 0;
  mx = PMX0;
  my = PMY0;
  prevMY = PMY0;
  endX = 0;
  endY = 0;
  targetX = 0;
  targetY = 0;
  moveRot = 0;
  fixRot = 0;
  pState = {
    F: { wrap: false, entry: 0, exit: 0, dir: 1 },
    M: { wrap: false, entry: 0, exit: 0, dir: 1 }
  };
  firstLocked = false;
  firstId = null;
  lockedEntry = 0;
  lockedExit = 0;
  lockedDir = 1;
  anchorAnimVisible = true;

  enter() {
    this.phase = 'idle';
    this.selected = null; this.anchorId = -1;
    this.mouseX = 0; this.mouseY = 0; this.path = []; this.ropeLen = 0;
    this.mx = PMX0; this.my = PMY0; this.prevMY = PMY0;
    this.endX = 0; this.endY = 0; this.targetX = 0; this.targetY = 0;
    this.moveRot = 0; this.fixRot = 0;
    this.pState = { F: { wrap: false, entry: 0, exit: 0, dir: 1 }, M: { wrap: false, entry: 0, exit: 0, dir: 1 } };
    this.firstLocked = false; this.firstId = null; this.lockedEntry = 0; this.lockedExit = 0; this.lockedDir = 1;
    this.anchorAnimVisible = true;
  }

  frame(ctx) {
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const { s } = getTransform();
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.save();
    ctx.translate(0, 0);
    ctx.scale(s, s);

    ctx.fillStyle = '#faf9f6';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    // ── 地面参考线 ──
    drawGroundLine(ctx, PGROUND_Y);

    // ── 支撑结构 ──
    drawSupport(ctx);

    if (this.phase === 'drawing' && this.selected) {
      this.path = buildExPath(
        this.selected.x, this.selected.y,
        this.mouseX, this.mouseY,
        this.mx, this.my,
        this.pState, this
      );
    } else if (this.phase === 'moving') {
      const lerp = 0.25;
      this.endX += (this.targetX - this.endX) * lerp;
      this.endY += (this.targetY - this.endY) * lerp;
      if (Math.abs(this.targetX - this.endX) < 0.1) this.endX = this.targetX;
      if (Math.abs(this.targetY - this.endY) < 0.1) this.endY = this.targetY;

      const startAt = (mx, my) => this.anchorId === 3
        ? { x: mx, y: my - PMR - 19 }
        : { x: this.selected.x, y: this.selected.y };

      if (this.targetX > 0) {
        const targetLen = this.ropeLen;
        const initSnap = this.snapPulleyState();
        let curMy = this.prevMY, curMx = this.mx;

        // 检查动滑轮是否仍有绳子包裹
        {
          const sStart = startAt(curMx, curMy);
          buildExPath(sStart.x, sStart.y, this.endX, this.endY, curMx, curMy, this.pState, this);
        }
        const hasWrap = this.pState.M.wrap || (this.anchorId === 3 && this.pState.F.wrap);
        this.restorePulleyState(initSnap);

        if (hasWrap) {
          for (let outer = 0; outer < 6; outer++) {
            this.restorePulleyState(initSnap);

            // Newton 迭代求解 my：绳长约束
            const nResult = solveNewtonRY(
              curMy, targetLen,
              (m) => {
                const sStart = startAt(curMx, m);
                return buildExPath(sStart.x, sStart.y, this.endX, this.endY, curMx, m, this.pState, this);
              },
              PFY + PFR + PMR + 40, DESIGN_H - 90,
              () => initSnap,
              (s) => this.restorePulleyState(s),
              { maxIter: 5, tolerance: 0.08 }
            );
            curMy = isNaN(nResult.y) ? this.prevMY : nResult.y;

            // 水平力平衡驱动 mx
            this.restorePulleyState(initSnap);
            {
              const sStart = startAt(curMx, curMy);
              const pp = buildExPath(sStart.x, sStart.y, this.endX, this.endY, curMx, curMy, this.pState, this);
              const forceDir = movableForceDir(pp, curMx, curMy, PMR);

              const absY = Math.abs(forceDir.y);
              const T = absY > 0.01 ? shared.weightGravity / absY : shared.weightGravity;

              curMx += T * forceDir.x * 0.18;
              curMx = Math.max(PFX - 120, Math.min(PFX + 120, curMx));
            }
          }

          this.restorePulleyState(initSnap);
          this.my = this.prevMY + (curMy - this.prevMY) * 0.35;
          this.mx = isNaN(curMx) ? PMX0 : curMx;
        } else {
          this.restorePulleyState(initSnap);
          this.my = Math.min(this.prevMY + 4, PGROUND_Y - 30);
          this.mx = curMx;
        }
      }

      {
        const sStart = startAt(this.mx, this.my);
        this.path = buildExPath(sStart.x, sStart.y, this.endX, this.endY, this.mx, this.my, this.pState, this);
      }
      this.moveRot += 2 * (this.my - this.prevMY) / PMR;
      this.fixRot += 2 * (this.my - this.prevMY) / PFR;
      this.prevMY = this.my;
    }

    // ── 绘制绳索路径 ──
    for (const seg of this.path) {
      if (seg.t === 'L') drawCable(ctx, seg.x1, seg.y1, seg.x2, seg.y2);
      else drawCableArc(ctx, seg.cx, seg.cy, seg.r - 2, seg.a1, seg.a2, seg.ccw);
    }

    // ── 滑轮 ──
    drawPulley(ctx, PFX, PFY, PFR, this.fixRot);
    drawPulley(ctx, this.mx, this.my, PMR, this.moveRot);

    // ── 重物 ──
    drawWeight(ctx, this.mx, this.my, shared.weightGravity);

    // ── 锚点 ──
    drawAnchor(ctx, ANCHOR1_X, ANCHOR1_Y, '①', true);
    drawAnchorPulse(ctx, ANCHOR1_X, ANCHOR1_Y, this.anchorAnimVisible);
    drawAnchor(ctx, ANCHOR2_X, ANCHOR2_Y, '②', true);
    drawAnchorPulse(ctx, ANCHOR2_X, ANCHOR2_Y, this.anchorAnimVisible);
    drawAnchor(ctx, ANCHOR3_X, ANCHOR3_Y, '③');
    drawAnchorPulse(ctx, ANCHOR3_X, ANCHOR3_Y, this.anchorAnimVisible);
    drawAnchor(ctx, this.mx, this.my - PMR - 19, '④');
    drawAnchorPulse(ctx, this.mx, this.my - PMR - 19, this.anchorAnimVisible);

    // ── 绳端拖拽手柄 ──
    if (this.phase === 'moving' && this.endX > 0) {
      drawRopeEndHandle(ctx, this.endX, this.endY);
    }

    // ── 提示文字 ──
    const PROMPT_Y = 80;
    if (this.phase === 'idle') {
      drawPromptText(ctx, 'idle', '点击锚点开始绕绳', '', '', PFX, PROMPT_Y, 24);
    } else if (this.phase === 'drawing') {
      drawPromptText(ctx, 'drawing', '', '拖动画出绕绳路径', '', PFX, PROMPT_Y, 22);
    } else if (this.phase === 'moving') {
      drawPromptText(ctx, 'moving', '', '', '拖拽绳端调整位置', PFX, PROMPT_Y, 22);
    }

    ctx.restore();
  }

  onDown(mxd, myd) {
    this.anchorAnimVisible = false;
    if (this.phase === 'idle') {
      const hits = [
        { x: ANCHOR1_X, y: ANCHOR1_Y },
        { x: ANCHOR2_X, y: ANCHOR2_Y },
        { x: ANCHOR3_X, y: ANCHOR3_Y },
        { x: this.mx, y: this.my - PMR - 19 },
      ];
      for (let i = 0; i < hits.length; i++) {
        const a = hits[i];
        if (Math.hypot(mxd - a.x, myd - a.y) < 16) {
          this.enter(); // reset everything
          this.anchorId = i; this.selected = { x: a.x, y: a.y };
          this.phase = 'drawing'; this.mouseX = mxd; this.mouseY = myd; this.path = [];
          return;
        }
      }
    }
    if (this.phase === 'moving') {
      const hitEnd = this.endX > 0 && Math.hypot(mxd - this.endX, myd - this.endY) < 14;
      if (hitEnd) {
        shared.dragging = true;
        shared.dragStartMouseX = mxd; shared.dragStartMouseY = myd;
        shared.dragStartEndX = this.targetX; shared.dragStartEndY = this.targetY;
      }
    }
  }

  onMove(mxd, myd) {
    if (this.phase === 'drawing') {
      const cp = clampPulley(mxd, myd, PFX, PFY, this.mx, this.my, PFR + 6, PMR + 6);
      this.mouseX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.mouseY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
    if (this.phase === 'moving' && shared.dragging) {
      const off = applyDragOffset(mxd, myd, shared.dragStartMouseX, shared.dragStartMouseY, shared.dragStartEndX, shared.dragStartEndY);
      const cp = clampPulley(off.x, off.y, PFX, PFY, this.mx, this.my, PFR + 6, PMR + 6);
      this.targetX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.targetY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
  }

  onUp() {
    if (this.phase === 'drawing') {
      this.path = buildExPath(this.selected.x, this.selected.y, this.mouseX, this.mouseY, this.mx, this.my, this.pState, this);
      this.ropeLen = pathLength(this.path);
      this.phase = 'moving'; this.endX = this.mouseX; this.endY = this.mouseY;
      this.targetX = this.mouseX; this.targetY = this.mouseY;
    }
    shared.dragging = false;
  }

  onDblClick() {
    if (this.phase !== 'drawing') return;
    if (this.firstLocked) {
      const sId = this.firstId === 'F' ? 'M' : 'F';
      this.pState[sId].wrap = false; this.firstLocked = false;
      return;
    }
    if (this.pState.M.wrap) { this.pState.M.wrap = false; return; }
    if (this.pState.F.wrap) { this.pState.F.wrap = false; return; }
  }

  onContextMenu() {
    this.onDblClick();
  }

  getCalibrationData() {
    const wH = heightM(this.my);
    const rH = heightM(this.endY);
    const rLen = this.path.length > 0 ? pathLength(this.path) - (this.ropeLen || 0) : null;
    return { wH, rH, rLen, ex: this.endX, ey: this.endY, tension: 0 };
  }

  snapPulleyState() {
    return {
      F: { ...this.pState.F }, M: { ...this.pState.M },
      firstLocked: this.firstLocked, firstId: this.firstId,
      lockedEntry: this.lockedEntry, lockedExit: this.lockedExit, lockedDir: this.lockedDir
    };
  }

  restorePulleyState(s) {
    Object.assign(this.pState.F, s.F);
    Object.assign(this.pState.M, s.M);
    this.firstLocked = s.firstLocked;
    this.firstId = s.firstId;
    this.lockedEntry = s.lockedEntry;
    this.lockedExit = s.lockedExit;
    this.lockedDir = s.lockedDir;
  }
}

// ══ modes/mode-fixed.js ══

class FixedPulleyMode extends PulleyMode {
  mouseX = 0;
  mouseY = 0;
  path = [];
  ropeLen = 0;
  mx = FWEIGHT_X;
  mxVel = 0;
  my = FWEIGHT_Y0;
  prevMY = FWEIGHT_Y0;
  endX = 0;
  endY = 0;
  targetX = 0;
  targetY = 0;
  fixRot = 0;
  pState = { wrap: false, entry: 0, exit: 0, dir: 1 };

  // 张力缓存，供 getCalibrationData 读取
  _tension = 0;
  // 锚点脉冲动画
  anchorAnimVisible = true;

  enter() {
    this.phase = 'idle'; this.mouseX = 0; this.mouseY = 0; this.path = []; this.ropeLen = 0;
    this.mx = FWEIGHT_X; this.mxVel = 0; this.my = FWEIGHT_Y0; this.prevMY = FWEIGHT_Y0;
    this.endX = 0; this.endY = 0; this.targetX = 0; this.targetY = 0; this.fixRot = 0;
    this.pState = { wrap: false, entry: 0, exit: 0, dir: 1 };
    this._tension = 0;
    this.anchorAnimVisible = true;
  }

  frame(ctx) {
    const dpr = window.devicePixelRatio || 1;
    const s = parseFloat(ctx.canvas.style.width) / DESIGN_W;
    ctx.save();
    ctx.scale(dpr * s, dpr * s);

    // ── 自由落体 & 路径更新 ──
    if (this.phase === 'idle') {
      this.my = Math.min(
        this.prevMY + 3,
        GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10)
      );
      this.path = [];
      this.endX = 0;
    }

    if (this.phase === 'drawing') {
      this.my = Math.min(
        this.prevMY + 3,
        GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10)
      );
      this.path = buildFixedPath(
        this.mx, this.my + MR + 24, this.mouseX, this.mouseY,
        FX, FY, FR, this.pState
      );
    }

    if (this.phase === 'moving') {
      // lerp endX/endY → targetX/targetY
      this.endX += (this.targetX - this.endX) * 0.25;
      this.endY += (this.targetY - this.endY) * 0.25;

      if (this.endX > 0) {
        // Newton 迭代：绳长约束
        const maxMY = GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10);
        const result = solveNewtonRY(
          this.my, this.ropeLen,
          (m) => buildFixedPath(this.mx, m + MR + 24, this.endX, this.endY, FX, FY, FR, this.pState),
          30, maxMY,
          () => this.snapPulleyState(),
          (s) => this.restorePulleyState(s),
          { maxIter: NEWTON_MAX_ITER, tolerance: NEWTON_TOLERANCE }
        );
        this.my = isNaN(result.y) ? this.prevMY : result.y;
        this.path = result.path;

        // ── 力学分析：拉力方向 + 水平力 + my 平滑 ──
        const anchorY = this.my + MR + 24;
        if (this.pState.wrap) {
          const forceDir = fixedForceDir(this.path, this.mx, anchorY);
          const absY = Math.abs(forceDir.y);
          const eta = Math.max(1 - shared.friction, 0.01);
          const T = absY > 0.01 ? shared.weightGravity / (absY * eta) : shared.weightGravity;
          this._tension = T;
          this.mxVel = this.mxVel * 0.82 + T * forceDir.x * 0.15;
          this.mxVel = Math.max(-12, Math.min(12, this.mxVel));
          this.mx += this.mxVel;
          this.mx = Math.max(FX - 100, Math.min(FX + 100, this.mx));
        } else {
          this._tension = 0;
        }
        const myDelta = this.applyMySmoothing(this.prevMY);
        this.fixRot -= 2 * myDelta / FR;

        // 用最终 mx/my 重建路径（参照动滑轮模式修复：防止快速拖拽时锚点与绳端脱开）
        this.path = buildFixedPath(this.mx, this.my + MR + 24, this.endX, this.endY, FX, FY, FR, this.pState);
      }
    }

    // ── Canvas 渲染 ──
    // 背景
    ctx.fillStyle = '#faf9f6';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    // 地面参考线
    drawGroundLine(ctx);

    // 路径渲染
    for (const seg of this.path) {
      if (seg.t === 'L') {
        drawCable(ctx, seg.x1, seg.y1, seg.x2, seg.y2);
      } else if (seg.t === 'A') {
        drawCableArc(ctx, seg.cx, seg.cy, seg.r, seg.a1, seg.a2, seg.ccw);
      }
    }

    // 横梁支撑
    drawSupport(ctx);

    // 定滑轮
    drawPulley(ctx, FX, FY, FR, this.fixRot);

    // 重物
    drawWeight(ctx, this.mx, this.my, shared.weightGravity);

    // 重物锚点
    const anchorY = this.my + MR + 24;
    drawAnchor(ctx, this.mx, anchorY, '', true);
    drawAnchorPulse(ctx, this.mx, anchorY, this.anchorAnimVisible);

    // 绳端拖拽手柄 & 拉力标签（仅拖拽时显示拉力）
    if (this.phase === 'moving' && this.endX > 0) {
      drawRopeEndHandle(ctx, this.endX, this.endY);
      if (shared.dragging) drawTensionLabel(ctx, this._tension, this.endX, this.endY);
    }

    // 提示文字
    const PROMPT_Y = 80;
    if (this.phase === 'idle') {
      drawPromptText(ctx, 'idle', '点击重物开始模拟', '', '', FX, PROMPT_Y, 24);
    } else if (this.phase === 'drawing') {
      drawPromptText(ctx, 'drawing', '', '拖动绳端到目标位置', '', FX, PROMPT_Y, 22);
    } else if (this.phase === 'moving') {
      drawPromptText(ctx, 'moving', '', '', '拖动绳端调整位置', FX, PROMPT_Y, 22);
    }

    // ── 张力计算（兜底，用于无包裹情况）──
    if (this.phase === 'moving' && this.path.length > 0 && !this.pState.wrap) {
      const dir = fixedForceDir(this.path, this.mx, this.my + MR + 24);
      if (dir.y > 0.01) {
        this._tension = shared.weightGravity / dir.y;
      } else {
        this._tension = 0;
      }
    }

    ctx.restore();
  }

  onDown(mxd, myd) {
    this.anchorAnimVisible = false;
    if (this.phase === 'idle') {
      const ax = this.mx, ay = this.my + MR + 24;
      if (Math.hypot(mxd - ax, myd - ay) < 16) {
        this.enter();
        this.phase = 'drawing'; this.mouseX = mxd; this.mouseY = myd; this.path = [];
      }
      return;
    }
    if (this.phase === 'moving') {
      const hitEnd = this.endX > 0 && Math.hypot(mxd - this.endX, myd - this.endY) < 14;
      if (hitEnd) {
        shared.dragging = true;
        shared.dragStartMouseX = mxd; shared.dragStartMouseY = myd;
        shared.dragStartEndX = this.targetX; shared.dragStartEndY = this.targetY;
      }
    }
  }

  onMove(mxd, myd) {
    if (this.phase === 'drawing') {
      const cp = clampPulley(mxd, myd, FX, FY, this.mx, this.my, FR + 6, MR + 6);
      this.mouseX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.mouseY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
    if (this.phase === 'moving' && shared.dragging) {
      const off = applyDragOffset(
        mxd, myd,
        shared.dragStartMouseX, shared.dragStartMouseY,
        shared.dragStartEndX, shared.dragStartEndY
      );
      const cp = clampPulley(off.x, off.y, FX, FY, this.mx, this.my, FR + 6, MR + 6);
      this.targetX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.targetY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
  }

  onUp() {
    if (this.phase === 'drawing') {
      this.path = buildFixedPath(
        this.mx, this.my + MR + 24, this.mouseX, this.mouseY,
        FX, FY, FR, this.pState
      );
      this.ropeLen = pathLength(this.path);
      this.phase = 'moving'; this.endX = this.mouseX; this.endY = this.mouseY;
      this.targetX = this.mouseX; this.targetY = this.mouseY;
    }
    shared.dragging = false;
  }

  onDblClick() {
    this.enter();
    shared.dragging = false;
  }

  getCalibrationData() {
    const wH = heightM(this.my);
    const rH = heightM(this.endY);
    const rLen = this.pState.wrap
      ? Math.sqrt(Math.max(0, Math.hypot(this.endX - FX, this.endY - FY) ** 2 - FR * FR))
      : null;
    return { wH, rH, rLen, ex: this.endX, ey: this.endY, tension: this._tension };
  }
}

// ══ modes/mode-movable.js ══

class MovablePulleyMode extends PulleyMode {
  mouseX = 0;
  mouseY = 0;
  path = [];
  ropeLen = 0;
  mx = MPMX0;
  mxVel = 0;
  my = MPMY0;
  prevMY = MPMY0;
  endX = 0;
  endY = 0;
  targetX = 0;
  targetY = 0;
  moveRot = 0;
  pState = { wrap: false, entry: 0, exit: 0, dir: 1 };
  _tension = 0;
  anchorAnimVisible = true;

  enter() {
    this.phase = 'idle'; this.mouseX = 0; this.mouseY = 0; this.path = []; this.ropeLen = 0;
    this.mx = MPMX0; this.mxVel = 0; this.my = MPMY0; this.prevMY = MPMY0;
    this.endX = 0; this.endY = 0; this.targetX = 0; this.targetY = 0; this.moveRot = 0;
    this.pState = { wrap: false, entry: 0, exit: 0, dir: 1 };
    this._tension = 0;
    this.anchorAnimVisible = true;
  }

  frame(ctx) {
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    let s = 1;
    try { s = getTransform().s; } catch (e) { /* ignore */ }
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.save();
    ctx.translate(0, 0);
    ctx.scale(s, s);

    // 背景
    ctx.fillStyle = '#faf9f6';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    // 地面参考线
    drawGroundLine(ctx);

    const ax = MANCHOR_X, ay = MANCHOR_Y;

    if (this.phase === 'idle') {
      this.my = Math.min(this.prevMY + 3, GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10));
      this.path = [];
      this.endX = 0;
    } else if (this.phase === 'drawing') {
      this.my = Math.min(this.prevMY + 3, GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10));
      this.path = buildMovablePath(ax, ay, this.mouseX, this.mouseY, this.mx, this.my, PMR, this.pState);
    } else if (this.phase === 'moving') {
      this.endX += (this.targetX - this.endX) * 0.25;
      this.endY += (this.targetY - this.endY) * 0.25;
      if (Math.abs(this.targetX - this.endX) < 0.1) this.endX = this.targetX;
      if (Math.abs(this.targetY - this.endY) < 0.1) this.endY = this.targetY;

      if (this.targetX > 0 && this.pState.wrap) {
        const targetLen = this.ropeLen;
        let curMy = this.prevMY, curMx = this.mx;

        // Newton 迭代 my：绳长约束（使用独立 curMx，迭代期间不变）
        const result = solveNewtonRY(
          curMy, targetLen,
          (m) => buildMovablePath(ax, ay, this.endX, this.endY, curMx, m, PMR, this.pState),
          30, GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10),
          () => this.snapPulleyState(),
          (s) => this.restorePulleyState(s),
        );
        curMy = isNaN(result.y) ? this.prevMY : result.y;

        // 水平力平衡：forceDir.x 驱动 mx
        const forcePath = buildMovablePath(ax, ay, this.endX, this.endY, curMx, curMy, PMR, this.pState);
        const forceDir = movableForceDir(forcePath, curMx, curMy, PMR);

        this.mxVel = this.mxVel * 0.82 + forceDir.x * 0.70;
        this.mxVel = Math.max(-8, Math.min(8, this.mxVel));
        curMx += this.mxVel;
        curMx = Math.max(150, Math.min(600, curMx));

        // 更新 mx/my/prevMY（参照原版平滑公式）
        this.mx = curMx;
        this.my = this.prevMY + (curMy - this.prevMY) * 0.35;
        const myDelta = this.my - this.prevMY;
        this.prevMY = this.my;
        this.moveRot += 2 * myDelta / PMR;

        // 用最终 mx/my 重建路径
        this.path = buildMovablePath(ax, ay, this.endX, this.endY, this.mx, this.my, PMR, this.pState);

        // 张力计算
        const arcCount = this.path.filter(s => s.t === 'A').length;
        this._tension = arcCount >= 2
          ? shared.weightGravity / (2 * Math.abs(forceDir.y))
          : shared.weightGravity / Math.abs(forceDir.y);
      } else if (this.targetX > 0) {
        this.my = Math.min(this.prevMY + 3, GROUND_Y - 48 * Math.sqrt(shared.weightGravity / 10));
        this.path = buildMovablePath(ax, ay, this.endX, this.endY, this.mx, this.my, PMR, this.pState);
        this.moveRot += 2 * (this.my - this.prevMY) / PMR;
        this.prevMY = this.my;
        this._tension = 0;
      }
    }

    // 绘制绳索路径
    for (const seg of this.path) {
      if (seg.t === 'L') drawCable(ctx, seg.x1, seg.y1, seg.x2, seg.y2);
      else drawCableArc(ctx, seg.cx, seg.cy, seg.r - 2, seg.a1, seg.a2, seg.ccw);
    }

    // 支撑（隐藏中心悬挂绳）
    drawSupport(ctx, true);

    // 定滑轮（不转）
    // 动滑轮模式无固定滑轮，只画锚点

    // 动滑轮
    drawPulley(ctx, this.mx, this.my, PMR, this.moveRot);

    // 重物
    drawWeight(ctx, this.mx, this.my, shared.weightGravity);

    // 锚点
    drawAnchor(ctx, ax, ay, '', false);
    drawAnchorPulse(ctx, ax, ay, this.anchorAnimVisible);

    // 绳端把手 + 张力标签（仅拖拽时显示）
    if (this.phase === 'moving') {
      drawRopeEndHandle(ctx, this.endX, this.endY);
      if (shared.dragging) drawTensionLabel(ctx, this._tension, this.endX, this.endY);
    }

    // 提示文字
    const PROMPT_Y = 80;
    if (this.phase === 'idle') {
      drawPromptText(ctx, 'idle', '按住锚点拖动绕绳，松手即固定', '', '', PFX, PROMPT_Y, 24);
    } else if (this.phase === 'drawing') {
      drawPromptText(ctx, 'drawing', '', '移动鼠标绕绳 | 右键撤销', '', PFX, PROMPT_Y, 22);
    } else if (this.phase === 'moving') {
      drawPromptText(ctx, 'moving', '', '', '按住绳端拖动 | 双击可重新绕绳', PFX, PROMPT_Y, 22);
    }

    ctx.restore();
  }

  onDown(mxd, myd) {
    this.anchorAnimVisible = false;
    if (this.phase === 'idle') {
      if (Math.hypot(mxd - MANCHOR_X, myd - MANCHOR_Y) < 16) {
        this.enter();
        this.phase = 'drawing'; this.mouseX = mxd; this.mouseY = myd;
      }
      return;
    }
    if (this.phase === 'moving') {
      const hitEnd = this.endX > 0 && Math.hypot(mxd - this.endX, myd - this.endY) < 14;
      if (hitEnd) {
        shared.dragging = true;
        shared.dragStartMouseX = mxd; shared.dragStartMouseY = myd;
        shared.dragStartEndX = this.targetX; shared.dragStartEndY = this.targetY;
      }
    }
  }

  onMove(mxd, myd) {
    if (this.phase === 'drawing') {
      const cp = clampPulley(mxd, myd, PFX, PFY, this.mx, this.my, PFR + 6, PMR + 6);
      this.mouseX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.mouseY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
    if (this.phase === 'moving' && shared.dragging) {
      const off = applyDragOffset(mxd, myd, shared.dragStartMouseX, shared.dragStartMouseY, shared.dragStartEndX, shared.dragStartEndY);
      const cp = clampPulley(off.x, off.y, PFX, PFY, this.mx, this.my, PFR + 6, PMR + 6);
      this.targetX = Math.max(40, Math.min(DESIGN_W - 40, cp.x));
      this.targetY = Math.max(30, Math.min(DESIGN_H - 40, cp.y));
    }
  }

  onUp() {
    if (this.phase === 'drawing') {
      this.path = buildMovablePath(MANCHOR_X, MANCHOR_Y, this.mouseX, this.mouseY, this.mx, this.my, PMR, this.pState);
      this.ropeLen = pathLength(this.path);
      this.phase = 'moving'; this.endX = this.mouseX; this.endY = this.mouseY;
      this.targetX = this.mouseX; this.targetY = this.mouseY;
    }
    shared.dragging = false;
  }

  onDblClick() {
    this.enter(); shared.dragging = false;
  }

  getCalibrationData() {
    const wH = heightM(this.my);
    const rH = heightM(this.endY);
    const rLen = this.pState.wrap ? Math.sqrt(Math.max(0, Math.hypot(this.endX - this.mx, this.endY - this.my) ** 2 - PMR * PMR)) : null;
    return { wH, rH, rLen, ex: this.endX, ey: this.endY, tension: this._tension || 0 };
  }
}

// ══ ui.js ══

// ── DOM 元素引用 ──
const landing = document.getElementById('landing');
const landingFrame = document.getElementById('landingFrame');
const mainLayout = document.getElementById('mainLayout');
const expTable = document.getElementById('expTable');
const expTbody = document.getElementById('expTbody');
const calcBtnGroup = document.getElementById('calcBtnGroup');
const pulleyGCtrl = document.getElementById('pulleyGCtrl');

// ── 滑块同步工具 ──
function syncSlider(inputEl, rangeEl, setter) {
  inputEl.addEventListener('input', () => {
    const v = parseFloat(inputEl.value);
    if (!isNaN(v)) { rangeEl.value = v; setter(v); }
  });
  rangeEl.addEventListener('input', () => {
    const v = parseFloat(rangeEl.value);
    inputEl.value = v; setter(v);
  });
}

// ── 参数控制初始化 ──
function initControls() {
  const weightGRange = document.getElementById('weightGRange');
  const weightGInput = document.getElementById('weightG');
  const pulleyGRange = document.getElementById('pulleyGRange');
  const pulleyGInput = document.getElementById('pulleyG');
  syncSlider(weightGInput, weightGRange, v => shared.weightGravity = v);
  syncSlider(pulleyGInput, pulleyGRange, v => shared.pulleyGravity = v);
  syncSlider(
    document.getElementById('friction'),
    document.getElementById('frictionRange'),
    v => shared.friction = v
  );
}

// ── 表格渲染 ──
function renderExpTable() {
  const first = shared.calibrated.length > 0 ? shared.calibrated[0] : null;
  const slim = (shared.routingMode === MODE.FIXED || shared.routingMode === MODE.MOVABLE);
  expTbody.innerHTML = shared.calibrated.map(c => {
    const rLenStr = c.rLen != null ? c.rLen.toFixed(0) : '—';
    const isFirst = (first && c.id === first.id);
    const wHDelta = (!isFirst && c.wH != null && first && first.wH != null) ? (c.wH - first.wH).toFixed(0) : '—';
    const moveDist = (first && c._ex != null && first._ex != null)
      ? Math.hypot(c._ex - first._ex, c._ey - first._ey)
      : null;
    const moveStr = (!isFirst && moveDist != null) ? moveDist.toFixed(0) : '—';
    const uwStr = (!isFirst && c.usefulWork != null) ? c.usefulWork.toFixed(2) : '—';
    const twStr = (!isFirst && c.totalWork != null) ? c.totalWork.toFixed(2) : '—';
    const efStr = (!isFirst && c.efficiency != null) ? (c.efficiency * 100).toFixed(1) + '%' : '—';
    const cls = c.id === shared.calibId ? 'marked' : '';
    return `<tr class="${cls}">
      <td>${c.id}</td><td>${c.wH.toFixed(0)}</td><td class="col-delta">${wHDelta}</td><td>${rLenStr}</td><td class="col-move">${moveStr}</td>
      <td>${c.wG}</td><td>${(!isFirst && c._tension != null) ? c._tension.toFixed(1) : '—'}</td><td class="col-pg">${c.pG}</td>
      <td class="col-uw">${uwStr}</td><td class="col-tw">${twStr}</td><td class="col-eff">${efStr}</td>
      <td><span class="calib-del" data-id="${c.id}">&times;</span></td>
    </tr>`;
  }).join('');
}

// ── 标定按钮 ──
function initCalibration(getModeData) {
  // getModeData() 返回 { wH, rH, rLen, ex, ey, tension }
  document.getElementById('btnCalib').addEventListener('click', () => {
    const data = getModeData();
    const id = ++shared.calibId;
    shared.calibrated.push({
      id, wH: data.wH, rH: data.rH, rLen: data.rLen,
      wG: shared.weightGravity, pG: shared.pulleyGravity, fric: shared.friction,
      usefulWork: null, totalWork: null, efficiency: null,
      _tension: data.tension,
      _ex: data.ex, _ey: data.ey
    });
    renderExpTable();
  });
}

// ── 计算按钮 ──
function initCalculationButtons() {
  document.getElementById('btnUsefulWork').addEventListener('click', () => {
    if (shared.calibrated.length === 0) return;
    const first = shared.calibrated[0];
    shared.calibrated.forEach(c => {
      if (c.id === first.id) return;
      c.usefulWork = parseFloat((Math.abs(c.wH - first.wH) * c.wG / 100).toFixed(2));
    });
    renderExpTable();
  });

  document.getElementById('btnTotalWork').addEventListener('click', () => {
    if (shared.calibrated.length === 0) return;
    const first = shared.calibrated[0];
    shared.calibrated.forEach(c => {
      if (c.id === first.id || c.rLen == null || c._ex == null) return;
      const moveDist = Math.hypot(c._ex - first._ex, c._ey - first._ey);
      c.totalWork = parseFloat((Math.abs(moveDist * c._tension / 100)).toFixed(2));
    });
    renderExpTable();
  });

  document.getElementById('btnEfficiency').addEventListener('click', () => {
    if (shared.calibrated.length === 0) return;
    const first = shared.calibrated[0];
    shared.calibrated.forEach(c => {
      if (c.id === first.id) return;
      if (c.usefulWork != null && c.totalWork != null && c.totalWork > 0) {
        c.efficiency = c.usefulWork / c.totalWork;
      }
    });
    renderExpTable();
  });
}

// ── 删除数据 ──
function initDeleteData() {
  document.getElementById('btnDelData').addEventListener('click', () => {
    shared.calibrated = [];
    shared.calibId = 0;
    renderExpTable();
  });
  // 事件委托：表格内删除按钮
  expTbody.addEventListener('click', (e) => {
    const del = e.target.closest('.calib-del');
    if (!del) return;
    const id = parseInt(del.dataset.id);
    shared.calibrated = shared.calibrated.filter(c => c.id !== id);
    renderExpTable();
  });
}

// ── Landing 页动画 ──
function animateLandingCards() {
  const cards = document.querySelectorAll('.route-card');
  cards.forEach(card => card.classList.remove('visible'));
  void cards[0].offsetHeight;
  requestAnimationFrame(() => {
    cards.forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), 100 * i);
    });
  });
}

// ── Landing 页卡片点击 → 路由切换 ──
function initLandingCards(onRouteSelect) {
  document.querySelectorAll('.route-card').forEach(card => {
    card.addEventListener('click', () => {
      const route = parseInt(card.dataset.route);
      card.style.transform = 'scale(0.94)';
      setTimeout(() => { card.style.transform = ''; }, 150);
      landingFrame.classList.add('exiting');
      setTimeout(() => {
        landing.classList.add('hidden');
        mainLayout.classList.add('visible');
        onRouteSelect(route);
      }, 400);
    });
  });
}

// ── 返回 Landing 页 ──
function initBackButtons(onBack) {
  document.getElementById('btnBack').addEventListener('click', onBack);
  document.getElementById('practiceBackBtn').addEventListener('click', onBack);
}

function goBack() {
  // 由调用方配合设置 DOM 状态
  landingFrame.classList.remove('exiting');
  landing.classList.remove('hidden');
  mainLayout.classList.remove('visible');
  mainLayout.classList.remove('practice-mode');
  calcBtnGroup.style.display = '';
  pulleyGCtrl.classList.remove('hidden');
  expTable.classList.remove('slim-cols');
  animateLandingCards();
}

// ── 重新绕绳按钮 ──
function initRewrapButtons(onRewrap, onPracticeReset) {
  document.getElementById('btnRewrap').addEventListener('click', onRewrap);
  document.getElementById('practiceResetBtn').addEventListener('click', onPracticeReset);
}

// ── UI 模式切换 ──
function updateUIMode(mode) {
  expTable.classList.toggle('slim-cols', mode === MODE.FIXED || mode === MODE.MOVABLE);
  if (mode === MODE.PRACTICE) {
    mainLayout.classList.add('practice-mode');
  } else {
    mainLayout.classList.remove('practice-mode');
  }
  if (mode === MODE.FIXED || mode === MODE.MOVABLE) {
    calcBtnGroup.style.display = 'none';
  } else {
    calcBtnGroup.style.display = '';
  }
  if (mode === MODE.FIXED) {
    pulleyGCtrl.classList.add('hidden');
  } else {
    pulleyGCtrl.classList.remove('hidden');
  }
  // 滑轮组模式（Method A/B）按钮更名为"重置"
  const rewarpBtn = document.getElementById('btnRewrap');
  rewarpBtn.textContent = (mode === MODE.METHOD_A || mode === MODE.METHOD_B) ? '重置' : '重新绕绳';
}

// ══ app.js ══

// ═══════════════════════════════════════════════
// app.js — 薄路由层：模式切换 + 输入分发 + 主循环
// ═══════════════════════════════════════════════

// ── Canvas ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');
init(canvas, canvasWrap);

// ── 当前活跃模式 ──
let activeMode = null;

// 模式构造器（METHOD_A 和 METHOD_B 共用 DualPulleyMode）
const ModeConstructors = [DualPulleyMode, DualPulleyMode, PracticeMode, FixedPulleyMode, MovablePulleyMode];

function switchToRoute(route) {
  activeMode = new ModeConstructors[route]();
  shared.routingMode = route;
  activeMode.enter();
  updateUIMode(route);
  resize(route);
  renderExpTable();
}

// ── 事件处理 ──
function onDown(e) {
  e.preventDefault();
  const cx = e.clientX || (e.touches && e.touches[0].clientX);
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  activeMode.onDown(toDesignX(cx), toDesignY(cy));

  if (shared.dragging) canvas.classList.add('dragging');
}

function onMove(e) {
  e.preventDefault();
  const cx = e.clientX || (e.touches && e.touches[0].clientX);
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  activeMode.onMove(toDesignX(cx), toDesignY(cy));
}

function onUp() {
  activeMode.onUp();
  shared.dragging = false;
  canvas.classList.remove('dragging');
}

function onDblClick() {
  activeMode.onDblClick();
  shared.dragging = false;
  canvas.classList.remove('dragging');
}

function onContextMenu(e) {
  e.preventDefault();
  activeMode.onContextMenu();
  shared.dragging = false;
  canvas.classList.remove('dragging');
}

bindEvents(canvas, { onDown, onMove, onUp, onDblClick, onContextMenu });

// ── 主循环 ──
function mainLoop() {
  if (activeMode) {
    activeMode.frame(ctx);
  }
  requestAnimationFrame(mainLoop);
}

// ── 标定按钮 ──
initCalibration(() => activeMode ? activeMode.getCalibrationData() : { wH: 0, rH: 0, rLen: null, ex: 0, ey: 0, tension: 0 });

// ── 启动 ──
function startApp() {
  resize(shared.routingMode);
  observeResize(() => resize(shared.routingMode));

  initControls();
  initCalculationButtons();
  initDeleteData();
  animateLandingCards();

  initLandingCards(switchToRoute);

  initBackButtons(() => {
    goBack();
    activeMode = null;
  });

  initRewrapButtons(
    () => { if (activeMode) activeMode.enter(); },
    () => { if (activeMode) activeMode.enter(); }
  );

  // 默认进入第一个模式
  switchToRoute(MODE.METHOD_A);
  mainLoop();
}

startApp();
})();

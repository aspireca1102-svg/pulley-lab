<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滑轮运动演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e4df;
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

/* ── Landing 选择页 ── */
#landing {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: #e8e4df;
  overflow: auto;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.landing-frame {
  display: flex; gap: 32px;
  border: 4px solid #8a847c; border-radius: 20px;
  padding: 32px 28px;
  background: #faf9f6;
  box-shadow: 0 6px 48px rgba(0,0,0,0.10);
  max-width: 95vw; flex-wrap: wrap; justify-content: center;
  transition: transform 0.5s ease, opacity 0.5s ease;
}
.landing-frame.exiting {
  transform: scale(0.92); opacity: 0;
}

.route-card {
  width: 280px; max-width: 90vw; padding: 32px 20px 28px;
  border: 2px solid #d0cdc6; border-radius: 14px;
  cursor: pointer; text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.2s;
  background: #fefefe;
  opacity: 0; transform: translateY(20px);
}
.route-card.visible {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.route-card:hover {
  border-color: #8a847c;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  transform: translateY(-3px);
}
.route-card:active { transform: scale(0.97); }

.route-icon {
  width: 100px; height: 100px; margin: 0 auto 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; letter-spacing: 2px;
  font-weight: bold;
}
.route-icon.a { background: #e8f0e8; color: #5a7a5a; border: 2px solid #a0b8a0; }
.route-icon.b { background: #f0e8e0; color: #8a6a4a; border: 2px solid #c0a890; }
.route-icon.c { background: #e8e4f0; color: #6a5a8a; border: 2px solid #b0a0c8; }
.route-icon.d { background: #e8f2f8; color: #4a7a8a; border: 2px solid #a0c0d0; }
.route-icon.e { background: #f2e8f0; color: #7a5a7a; border: 2px solid #c0a0b8; }
.route-card h4 {
  font-size: 24px; color: #3a3530; margin-bottom: 10px; letter-spacing: 2px;
}
.route-card p {
  font-size: 16px; color: #8a847c; line-height: 1.6; letter-spacing: 0.5px;
}
.route-card .route-label {
  display: inline-block; margin-top: 16px; padding: 5px 22px;
  border-radius: 16px; font-size: 15px; letter-spacing: 1px;
}
.route-card.a .route-label { background: #e8f0e8; color: #5a7a5a; }
.route-card.b .route-label { background: #f0e8e0; color: #8a6a4a; }
.route-card.c .route-label { background: #e8e4f0; color: #6a5a8a; }
.route-card.d .route-label { background: #e8f2f8; color: #4a7a8a; }
.route-card.e .route-label { background: #f2e8f0; color: #7a5a7a; }

#expTable.slim-cols .col-delta,
#expTable.slim-cols .col-move,
#expTable.slim-cols .col-uw,
#expTable.slim-cols .col-tw,
#expTable.slim-cols .col-eff,
#expTable.slim-cols .col-pg { display: none; }

#pulleyGCtrl.hidden { display: none; }

@media (max-width: 700px) {
  .landing-frame { gap: 16px; padding: 20px 16px; }
  .route-card { width: 220px; padding: 24px 14px 20px; }
  .route-card h4 { font-size: 20px; }
  .route-card p { font-size: 14px; }
  .route-icon { width: 72px; height: 72px; font-size: 18px; }
}

/* ── 主布局：初始隐藏，选择后淡入 ── */
#mainLayout {
  display: flex; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.6s ease 0.35s;
}
#mainLayout.visible { opacity: 1; }
.panel-left {
  flex: 4; min-width: 0;
  background: #faf9f6; border-right: 1px solid #d0cdc6;
  padding: 12px 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
}
.panel-left h3 {
  font-size: 14px; color: #4a4540; text-align: center; letter-spacing: 1px;
  border-bottom: 1px solid #d0cdc6; padding-bottom: 8px;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 7px 6px; text-align: center; border-bottom: 1px solid #e8e4df; }
.data-table th { color: #6b6560; font-weight: 500; font-size: 12px; }
.data-table td { color: #2a2520; font-variant-numeric: tabular-nums; font-family: "SF Mono","Menlo","Consolas",monospace; }
.data-table tr.marked { background: #fff8e1; }
.panel-center { flex: 5; display: flex; align-items: center; justify-content: center; min-width: 0; }
.canvas-wrap { border: 3px solid #8a847c; border-radius: 6px; overflow: hidden; width: 100%; height: 100%; position: relative; }
canvas { display: block; cursor: grab; touch-action: none; }
canvas.dragging { cursor: grabbing; }
#mainLayout.practice-mode .canvas-wrap { width: auto; height: auto; }
.panel-right {
  flex: 1; min-width: 0;
  background: #faf9f6; border-left: 1px solid #d0cdc6;
  padding: 14px 10px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
}
.panel-right h3 { font-size: 14px; color: #4a4540; text-align: center; letter-spacing: 1px; border-bottom: 1px solid #d0cdc6; padding-bottom: 8px; }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 12px; color: #6b6560; display: flex; justify-content: space-between; align-items: center; }
.ctrl-group input[type=range] { width: 100%; accent-color: #7a7060; }
.ctrl-group input[type=number] { width: 56px; padding: 2px 4px; border: 1px solid #c5c0b8; border-radius: 3px; font-size: 12px; text-align: right; font-family: "SF Mono","Menlo","Consolas",monospace; }
.btn { width: 100%; padding: 8px 0; border: 1px solid #b8b0a0; background: #f0ece6; border-radius: 4px; cursor: pointer; font-size: 13px; color: #4a4540; letter-spacing: 1px; transition: background 0.15s; }
.btn:hover { background: #e4ded4; }
.btn.danger { background: #fff0f0; border-color: #d4b0b0; font-size: 11px; padding: 4px 0; }
.btn.danger:hover { background: #ffe0e0; }
.calib-list { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
.calib-item { font-size: 11px; color: #6b6560; display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; background: #fff8e1; border-radius: 3px; }
.calib-del { cursor: pointer; color: #c44; font-weight: bold; font-size: 13px; line-height: 1; }
#mainLayout.practice-mode .panel-left,
#mainLayout.practice-mode .panel-right { display: none; }
.practice-back-btn {
  position: absolute; bottom: 16px; right: 16px; z-index: 10;
  width: 120px; height: 36px;
  padding: 0;
  border: 1px solid #b8b0a0; border-radius: 6px;
  background: rgba(250,249,246,0.92); color: #4a4540;
  font-size: 13px; cursor: pointer; letter-spacing: 1px;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  display: none; transition: background 0.15s;
}
.practice-back-btn:hover { background: #e4ded4; }
#mainLayout.practice-mode .practice-back-btn { display: block; }
.practice-reset-btn {
  position: absolute; bottom: 56px; right: 16px; z-index: 10;
  width: 120px; height: 36px;
  padding: 0;
  border: 1px solid #b8b0a0; border-radius: 6px;
  background: rgba(250,249,246,0.92); color: #4a4540;
  font-size: 13px; cursor: pointer; letter-spacing: 1px;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  display: none; transition: background 0.15s;
}
.practice-reset-btn:hover { background: #e4ded4; }
#mainLayout.practice-mode .practice-reset-btn { display: block; }

</style>
</head>
<body>

<!-- ── Landing 选择页 ── -->
<div id="landing">
  <div class="landing-frame" id="landingFrame">
    <div class="route-card d" data-route="3">
      <div class="route-icon d">定滑轮</div>
      <h4>定滑轮模式</h4>
    </div>
    <div class="route-card e" data-route="4">
      <div class="route-icon e">动滑轮</div>
      <h4>动滑轮模式</h4>
    </div>
    <div class="route-card c" data-route="2">
      <div class="route-icon c">练习</div>
      <h4>绕绳练习</h4>
      <p>自由绕绳</p>
    </div>
    <div class="route-card a" data-route="0">
      <div class="route-icon a">滑轮组</div>
      <h4>探究绕法 A</h4>
      <p>动滑轮顶部锚定<br>三股绳共同承重</p>

    <div class="route-card b" data-route="1">

</div>

<!-- ── 主布局 ── -->
<div id="mainLayout">
<div class="panel-left">

  <div style="overflow-x:auto;flex:1;min-height:0">
  <table class="data-table" id="expTable">

<div class="panel-right">
  <h3>参数控制</h3>
  <div class="ctrl-group">
    <label>重物重力 <input type="number" id="weightG" value="15" min="1" max="50" step="1"> N</label>
    <input type="range" id="weightGRange" value="10" min="1" max="50" step="1">
  </div>
  <div class="ctrl-group" id="pulleyGCtrl">
    <label>动滑轮重力 <input type="number" id="pulleyG" value="0" min="0" max="20" step="0.5"> N</label>

    <input type="range" id="frictionRange" value="0" min="0" max="0.2" step="0.01">
  </div>
  <button class="btn" id="btnCalib">位置标定</button>

  <button class="btn" id="btnBack" style="margin-top:12px;background:#faf9f6;border:1px solid #d0cdc6;color:#8a847c;font-size:12px;">← 返回</button>

<script>
(function() {
// ══ constants.js ══

// ── Canvas 设计坐标系 ──
const DESIGN_W = 750;
const DESIGN_H = 1300;
const PRACTICE_DESIGN_H = 860; // 练习模式：只显示横梁到地平线
const GROUND_Y = 800;          // 地面参考线 y 坐标（高度 0cm）

// ── 定滑轮 ──
const FX = 375;               // 定滑轮圆心 X
const FY = 150;               // 定滑轮圆心 Y
const FR = 34;                // 定滑轮半径

// ── 动滑轮 ──
const MR = 34;                // 动滑轮半径
const MBASE_Y = 460;          // 动滑轮初始圆心 Y
const SCALE_BASE_X = 450;     // 绳端初始 X（动滑轮右侧附近）
const SCALE_BASE_Y = 560;     // 绳端初始 Y（高度 240cm）

// ── 练习模式锚点 ──
const ANCHOR1_X = 511, ANCHOR1_Y = 26;
const ANCHOR2_X = 239, ANCHOR2_Y = 26;   // 横梁左侧，与①关于PFX对称
const ANCHOR3_X = 375, ANCHOR3_Y = 203;   // 定滑轮下端挂钩环圆心
const PFX = 375, PFY = 150, PFR = 34;     // 定滑轮（同原位置）
const PMX0 = 375, PMY0 = 680, PMR = 34;   // 动滑轮初始
const PGROUND_Y = 800;

// ── Method B ──
const ANCHOR_EXT_B = 27;                   // Method B 锚点偏移
const AY_B = FY + FR + ANCHOR_EXT_B;       // 锚点 Y（定滑轮下端）

// ── 定滑轮模式 ──
const FWEIGHT_X = FX;
const FWEIGHT_Y0 = 699;                    // 重物初始高度

// ── 动滑轮模式 ──
const MANCHOR_X = ANCHOR2_X;
const MANCHOR_Y = ANCHOR2_Y;
const MPMX0 = PMX0;
const MPMY0 = 700;

// ── 模拟参数 ──
const ENGAGE_MARGIN = 12;                  // 包裹检测容差
const MAX_ARC = 1.8 * Math.PI;             // 最大包裹弧角
const LERP_SPEED = 0.22;                   // 绳端平滑跟随速度
const LERP_SLOW = 0.35;                    // 慢速平滑
const LERP_MEDIUM = 0.25;                  // 中速平滑

// ── 路由模式枚举 ──
const MODE = Object.freeze({
  METHOD_A: 0,
  METHOD_B: 1,
  PRACTICE:  2,
  FIXED:     3,
  MOVABLE:   4,
});

// ── 牛顿迭代参数 ──
const NEWTON_MAX_ITER = 6;
const NEWTON_TOLERANCE = 0.05;
const FORCE_BALANCE_MAX_ITER = 10;
const FORCE_BALANCE_TOLERANCE = 0.002;

// ══ geometry.js ══

// ── 纯几何计算函数 ──
// 无状态依赖，输入确定 → 输出确定

/**
 * 点到线段的距离
 * @returns {number} 最短距离
 */
function ptToSegDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 < 1e-9) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

/**
 * 点到圆的两条切线切点（按角度归一化到 [0, 2π)）
 * @returns {Array<{a:number, x:number, y:number}>} 两个切点，点在圆内无解
 */
function tangentsFrom(px, py, cx, cy, r) {
  const d = Math.hypot(px - cx, py - cy);
  if (d <= r + 0.01) return [];
  const th = Math.atan2(py - cy, px - cx);
  const ph = Math.acos(Math.min(r / d, 1));
  const norm = (a) => ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  return [
    { a: norm(th + ph), x: cx + r * Math.cos(th + ph), y: cy + r * Math.sin(th + ph) },
    { a: norm(th - ph), x: cx + r * Math.cos(th - ph), y: cy + r * Math.sin(th - ph) },
  ];
}

/**
 * 线段与圆的交点
 * @returns {Array<{t:number, x:number, y:number}>} 按 t 排序的交点
 */
function segCircleIsec(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const fx = x1 - cx, fy = y1 - cy;
  const a = dx * dx + dy * dy;
  if (a < 1e-9) return [];
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return [];
  const sqrtD = Math.sqrt(disc);
  const pts = [];
  const t1 = (-b - sqrtD) / (2 * a);
  const t2 = (-b + sqrtD) / (2 * a);
  if (t1 >= 0 && t1 <= 1) pts.push({ t: t1, x: x1 + t1 * dx, y: y1 + t1 * dy });
  if (t2 >= 0 && t2 <= 1) pts.push({ t: t2, x: x1 + t2 * dx, y: y1 + t2 * dy });
  pts.sort((a, b) => a.t - b.t);
  return pts;
}

/**
 * 绳端钳制：禁止坐标进入滑轮内部
 */
function clampPulley(px, py, fixX, fixY, movX, movY, fixR, movR) {
  let cx = px, cy = py;
  const pulleys = [
    { cx: fixX, cy: fixY, r: fixR },
    { cx: movX, cy: movY, r: movR },
  ];
  for (const p of pulleys) {
    const dx = cx - p.cx, dy = cy - p.cy;
    const dist = Math.hypot(dx, dy);
    if (dist < p.r && dist > 0.01) {
      cx = p.cx + dx * p.r / dist;
      cy = p.cy + dy * p.r / dist;
    }
  }
  return { x: cx, y: cy };
}

// ══ rope-engine.js ══

// ── 滑轮包裹引擎：公共核心函数 ──
// 处理单个滑轮包裹：给定源点(sx,sy)、目标点(tx,ty)、滑轮(cx,cy,r)和包裹状态st
// 返回包裹弧段信息 {entry, exit, cx, cy, r, dir} 或 null
function processOnePulley(sx, sy, tx, ty, cx, cy, r, st) {
  if (st.wrap) {
    const exitTans = tangentsFrom(tx, ty, cx, cy, r);
    if (exitTans.length < 2) { st.wrap = false; return null; }
    let u0 = exitTans[0].a + Math.round((st.exit - exitTans[0].a) / (2*Math.PI)) * 2*Math.PI;
    let u1 = exitTans[1].a + Math.round((st.exit - exitTans[1].a) / (2*Math.PI)) * 2*Math.PI;
    const pick = Math.abs(u0 - st.exit) < Math.abs(u1 - st.exit) ? 0 : 1;
    const newExit = pick === 0 ? u0 : u1;
    const arcLen = (newExit - st.entry) * st.dir;
    if (arcLen <= 0.001) { st.wrap = false; return null; }
    st.exit = newExit;
    const exitPt = { x: cx + r * Math.cos(exitTans[pick].a), y: cy + r * Math.sin(exitTans[pick].a) };
    return {
      entry: { x: cx + r * Math.cos(st.entry), y: cy + r * Math.sin(st.entry), a: st.entry },
      exit: { x: exitPt.x, y: exitPt.y, a: st.exit },
      cx, cy, r, dir: st.dir
    };
  } else {
    if (ptToSegDist(cx, cy, sx, sy, tx, ty) > r) return null;
    const entryTans = tangentsFrom(sx, sy, cx, cy, r);
    if (entryTans.length < 2) return null;
    const exitTans = tangentsFrom(tx, ty, cx, cy, r);
    if (exitTans.length < 2) return null;
    let bestEntry = null, bestExit = null, bestArc = Infinity, bestDir = 0;
    for (const et of entryTans) {
      for (const xt of exitTans) {
        let ux = xt.a;
        if (ux <= et.a) ux += 2*Math.PI;
        const arcCCW = ux - et.a;
        if (arcCCW > 0.001 && arcCCW <= MAX_ARC && arcCCW < bestArc) {
          bestArc = arcCCW; bestEntry = et; bestExit = xt; bestDir = 1;
        }
        ux = xt.a;
        if (ux >= et.a) ux -= 2*Math.PI;
        const arcCW = et.a - ux;
        if (arcCW > 0.001 && arcCW <= MAX_ARC && arcCW < bestArc) {
          bestArc = arcCW; bestEntry = et; bestExit = xt; bestDir = -1;
        }
      }
    }
    if (!bestEntry) return null;
    const entryAng = ((bestEntry.a % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    let exitU = bestExit.a;
    if (bestDir === 1 && exitU < entryAng) exitU += 2*Math.PI;
    if (bestDir === -1 && exitU > entryAng) exitU -= 2*Math.PI;
    const entryPt = { x: cx + r * Math.cos(entryAng), y: cy + r * Math.sin(entryAng) };
    const exitPt = { x: cx + r * Math.cos(bestExit.a), y: cy + r * Math.sin(bestExit.a) };
    st.wrap = true; st.entry = entryAng; st.exit = exitU; st.dir = bestDir;
    return {
      entry: { x: entryPt.x, y: entryPt.y, a: entryAng },
      exit: { x: exitPt.x, y: exitPt.y, a: exitU },
      cx, cy, r, dir: bestDir
    };
  }
}

// ── 练习模式：双滑轮完整包裹路径（复用 processOnePulley） ──
// ax=锚点X, ay=锚点Y, hx=绳端X, hy=绳端Y, pmx=动滑轮X, pmy=动滑轮Y
// 需要 ps.pState (F/M), ps.firstLocked 等状态
function buildExPath(ax, ay, hx, hy, pmx, pmy, state, locked) {
  const path = [];
  let sx = ax, sy = ay;

  function pushSeg(result) {
    path.push({ t: 'L', x1: sx, y1: sy, x2: result.entry.x, y2: result.entry.y });
    path.push({ t: 'A', cx: result.cx, cy: result.cy, r: result.r, a1: result.entry.a, a2: result.exit.a, ccw: result.dir > 0 });
    sx = result.exit.x; sy = result.exit.y;
  }

  function replayFirst(id, cx, cy, r) {
    const entryPt = { x: cx + r * Math.cos(locked.lockedEntry), y: cy + r * Math.sin(locked.lockedEntry) };
    const exitPt  = { x: cx + r * Math.cos(locked.lockedExit),  y: cy + r * Math.sin(locked.lockedExit) };
    path.push({ t: 'L', x1: sx, y1: sy, x2: entryPt.x, y2: entryPt.y });
    path.push({ t: 'A', cx, cy, r, a1: locked.lockedEntry, a2: locked.lockedExit, ccw: locked.lockedDir > 0 });
    sx = exitPt.x; sy = exitPt.y;
  }

  function exitLineHitsOther(id, otherCx, otherCy) {
    const cx = id === 'F' ? PFX : pmx;
    const cy = id === 'F' ? PFY : pmy;
    const r  = id === 'F' ? PFR : PMR;
    const ea = locked.firstLocked ? locked.lockedExit : state[id].exit;
    const ex = cx + r * Math.cos(ea);
    const ey = cy + r * Math.sin(ea);
    return ptToSegDist(otherCx, otherCy, ex, ey, hx, hy);
  }

  // Phase C：首个滑轮已冻结
  if (locked.firstLocked) {
    const fId = locked.firstId;
    const fCx = fId === 'F' ? PFX : pmx;
    const fCy = fId === 'F' ? PFY : pmy;
    const fR  = fId === 'F' ? PFR : PMR;
    const sId = fId === 'F' ? 'M' : 'F';
    const sCx = sId === 'F' ? PFX : pmx;
    const sCy = sId === 'F' ? PFY : pmy;
    const sR  = sId === 'F' ? PFR : PMR;

    replayFirst(fId, fCx, fCy, fR);

    const r2 = processOnePulley(sx, sy, hx, hy, sCx, sCy, sR, state[sId]);
    if (r2) {
      pushSeg(r2);
    } else {
      locked.firstLocked = false;
      state[sId].wrap = false;
    }
  }

  // Phase A：都未包裹
  else if (!state.F.wrap && !state.M.wrap) {
    const hitsF = segCircleIsec(sx, sy, hx, hy, PFX, PFY, PFR);
    const hitsM = segCircleIsec(sx, sy, hx, hy, pmx, pmy, PMR);
    const dF = hitsF.length > 0 ? hitsF[0].t : Infinity;
    const dM = hitsM.length > 0 ? hitsM[0].t : Infinity;
    if (dF < dM) {
      const rF = processOnePulley(sx, sy, hx, hy, PFX, PFY, PFR, state.F);
      if (rF) { pushSeg(rF); }
      const rM = processOnePulley(sx, sy, hx, hy, pmx, pmy, PMR, state.M);
      if (rM) { pushSeg(rM); }
    } else if (dM < dF) {
      const rM = processOnePulley(sx, sy, hx, hy, pmx, pmy, PMR, state.M);
      if (rM) { pushSeg(rM); }
      const rF = processOnePulley(sx, sy, hx, hy, PFX, PFY, PFR, state.F);
      if (rF) { pushSeg(rF); }
    }
  }

  // Phase B：仅一个包裹
  else {
    const id = state.F.wrap ? 'F' : 'M';
    const cx = id === 'F' ? PFX : pmx;
    const cy = id === 'F' ? PFY : pmy;
    const r  = id === 'F' ? PFR : PMR;
    const oId = id === 'F' ? 'M' : 'F';
    const ocx = id === 'F' ? pmx : PFX;
    const ocy = id === 'F' ? pmy : PFY;
    const or  = id === 'F' ? PMR : PFR;

    if (exitLineHitsOther(id, ocx, ocy) <= or + ENGAGE_MARGIN) {
      locked.firstLocked = true;
      locked.firstId = id;
      locked.lockedEntry = state[id].entry;
      locked.lockedExit  = state[id].exit;
      locked.lockedDir   = state[id].dir;

      replayFirst(id, cx, cy, r);

      const r2 = processOnePulley(sx, sy, hx, hy, ocx, ocy, or, state[oId]);
      if (r2) { pushSeg(r2); }
      else { locked.firstLocked = false; }
    } else {
      const r1 = processOnePulley(sx, sy, hx, hy, cx, cy, r, state[id]);
      if (r1) { pushSeg(r1); }
    }
  }

  path.push({ t: 'L', x1: sx, y1: sy, x2: hx, y2: hy });
  return path;
}

// ── 定滑轮：构建定滑轮包裹路径（锚点→定滑轮弧→绳端） ──
// 使用 pState: {wrap, entry, exit, dir}
function buildFixedPath(ax, ay, hx, hy, fx, fy, fr, pState) {
  const path = [];
  let sx = ax, sy = ay;

  const result = processOnePulley(sx, sy, hx, hy, fx, fy, fr, pState);
  if (result) {
    path.push({ t: 'L', x1: sx, y1: sy, x2: result.entry.x, y2: result.entry.y });
    path.push({ t: 'A', cx: result.cx, cy: result.cy, r: result.r, a1: result.entry.a, a2: result.exit.a, ccw: result.dir > 0 });
    sx = result.exit.x; sy = result.exit.y;
  }

  path.push({ t: 'L', x1: sx, y1: sy, x2: hx, y2: hy });
  return path;
}

// ── 动滑轮：锚点→动滑轮弧→绳端 ──
function buildMovablePath(ax, ay, hx, hy, pmx, pmy, r, pState) {
  const path = [];
  let sx = ax, sy = ay;

  const result = processOnePulley(sx, sy, hx, hy, pmx, pmy, r, pState);
  if (result) {
    path.push({ t: 'L', x1: sx, y1: sy, x2: result.entry.x, y2: result.entry.y });
    path.push({ t: 'A', cx: result.cx, cy: result.cy, r: result.r, a1: result.entry.a, a2: result.exit.a, ccw: result.dir > 0 });
    sx = result.exit.x; sy = result.exit.y;
  }

  path.push({ t: 'L', x1: sx, y1: sy, x2: hx, y2: hy });
  return path;
}

// ── 路径总长 ──
function pathLength(path) {
  let len = 0;
  for (const seg of path) {
    if (seg.t === 'L') len += Math.hypot(seg.x2 - seg.x1, seg.y2 - seg.y1);
    else {
      let d = seg.a2 - seg.a1;
      if (seg.ccw) { d = -d; if (d < 0) d += 2*Math.PI; }
      else { if (d < 0) d += 2*Math.PI; }
      len += seg.r * d;
    }
  }
  return len;
}

// ── 定滑轮受力方向：首段绳子对重物的拉力方向 ──
function fixedForceDir(path, wx, wy) {
  const dir = { x: 0, y: 0 };
  if (path.length > 0 && path[0].t === 'L') {
    const seg = path[0];
    if (Math.hypot(seg.x1 - wx, seg.y1 - wy) < FR + 40) {
      const dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1;
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { dir.x = dx / len; dir.y = dy / len; }
    }
  }
  return dir;
}

// ── 动滑轮受力方向：所有牵拉动滑轮的绳段单位方向矢量和 ──
function movableForceDir(path, mx, my, r) {
  const dir = { x: 0, y: 0 };
  let hasArcOnM = false;
  for (let i = 0; i < path.length; i++) {
    const seg = path[i];
    if (seg.t !== 'A') continue;
    if (Math.hypot(seg.cx - mx, seg.cy - my) > r + 1) continue;
    hasArcOnM = true;
    const prevL = i > 0 && path[i-1].t === 'L' ? path[i-1] : null;
    const nextL = i < path.length - 1 && path[i+1].t === 'L' ? path[i+1] : null;
    if (prevL) {
      const ex = seg.cx + seg.r * Math.cos(seg.a1);
      const ey = seg.cy + seg.r * Math.sin(seg.a1);
      const dx = prevL.x1 - ex, dy = prevL.y1 - ey;
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { dir.x += dx / len; dir.y += dy / len; }
    }
    if (nextL) {
      const ex = seg.cx + seg.r * Math.cos(seg.a2);
      const ey = seg.cy + seg.r * Math.sin(seg.a2);
      const dx = nextL.x2 - ex, dy = nextL.y2 - ey;
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { dir.x += dx / len; dir.y += dy / len; }
    }
  }
  if (!hasArcOnM && path.length > 0 && path[0].t === 'L') {
    const seg = path[0];
    if (Math.hypot(seg.x1 - mx, seg.y1 - my) < r + 24) {
      const dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1;
      const len = Math.hypot(dx, dy);
      if (len > 0.01) { dir.x += dx / len; dir.y += dy / len; }
    }
  }
  return dir;
}

// ── Method A 绳段长度 ──
function L1(mx, my) {
  const ax = mx, ay = my - MR - 27;
  const fxr = FX + FR;
  return Math.hypot(fxr - ax, FY - ay);
}

function L3(mx, my) {
  return Math.hypot(mx - FX, my - FY);
}

function L5(mx, my, ex, ey) {
  const d = Math.hypot(ex - mx, ey - my);
  if (d <= MR) return 0;
  return Math.sqrt(d * d - MR * MR);
}

function wrapAngle(mx, my, ex, ey) {
  const d = Math.hypot(ex - mx, ey - my);
  if (d <= MR) return Math.PI;
  const a = Math.atan2(ey - my, ex - mx);
  const b = Math.acos(MR / d);
  let arc = Math.PI - (a + b);
  if (arc <= 0) arc += 2 * Math.PI;
  return arc;
}

// ── Method B 绳段 ──
function L1_B(mx, my) {
  const d = Math.hypot(FX - mx, AY_B - my);
  if (d <= MR) return 0;
  return Math.sqrt(d * d - MR * MR);
}

function movableArcB(mx, my) {
  const d = Math.hypot(FX - mx, AY_B - my);
  if (d <= MR) return Math.PI;
  const a = Math.atan2(AY_B - my, FX - mx);
  const b = Math.acos(MR / d);
  const thetaRight = a + b;
  let arc = Math.PI - thetaRight;
  if (arc < 0) arc += 2 * Math.PI;
  return arc;
}

function L5_B(ex, ey) {
  const d = Math.hypot(ex - FX, ey - FY);
  if (d <= FR) return 0;
  return Math.sqrt(d * d - FR * FR);
}

function fixedRightAngle(ex, ey) {
  const d = Math.hypot(ex - FX, ey - FY);
  if (d <= FR) return 0;
  const a = Math.atan2(ey - FY, ex - FX);
  const b = Math.acos(FR / d);
  return a + b;
}

// ── 滑轮切线信息：给定滑轮圆心和外部点，返回切点、切线长度和水平力分量 ──
// @param cx,cy,r  滑轮圆心和半径
// @param ex,ey    外部点坐标
// @returns {{ tx:number, ty:number, len:number, hComp:number, d:number }}
//   tx,ty : 切点坐标（d<=r 时退化为圆心）
//   len   : 切线长度 sqrt(d²-r²)（d<=r 时为 0）
//   hComp : 水平力分量 (ex-tx)/max(len,0.1)（d<=r 时为 0）
//   d     : 圆心到外部点的距离
function pulleyTangent(cx, cy, r, ex, ey) {
  const d = Math.hypot(ex - cx, ey - cy);
  if (d <= r) return { tx: cx, ty: cy, len: 0, hComp: 0, d };
  const a = Math.atan2(ey - cy, ex - cx);
  const b = Math.acos(r / d);
  const tx = cx + Math.cos(a + b) * r;
  const ty = cy + Math.sin(a + b) * r;
  const len = Math.sqrt(d * d - r * r);
  return { tx, ty, len, hComp: (ex - tx) / Math.max(len, 0.1), d };
}

// ── 通用 Newton 求解器：绳长约束 ──
// 求解绳索悬挂点 Y 坐标，使绳索路径长度 = 目标长度
// @param ry        初始 y 坐标
// @param targetLen 目标绳索路径长度
// @param buildPath 路径构建函数：(y) => pathArray（会修改内部 pulley 状态）
// @param minY      下界 / maxY 上界
// @param saveFn    保存 pulley 状态：() => snapshot
// @param restoreFn 恢复 pulley 状态：(snapshot) => void
// @param opts      { maxIter=6, tolerance=0.05, eps=0.5 }
// @returns         { y: number, path: Array }  — 收敛后的 y 和最终路径
function solveNewtonRY(ry, targetLen, buildPath, minY, maxY, saveFn, restoreFn, opts = {}) {
  const { maxIter = 6, tolerance = 0.05, eps = 0.5 } = opts;
  const snapshot = saveFn();
  let y = ry;
  for (let i = 0; i < maxIter; i++) {
    restoreFn(snapshot);
    const p1 = buildPath(y);
    const len1 = pathLength(p1);
    const err = len1 - targetLen;
    if (Math.abs(err) < tolerance) break;

    restoreFn(snapshot);
    const p2 = buildPath(y + eps);
    const len2 = pathLength(p2);
    const deriv = (len2 - len1) / eps;
    if (Math.abs(deriv) < 1e-7) break;

    y = Math.max(minY, Math.min(maxY, y - err / deriv));
  }
  restoreFn(snapshot);
  const finalPath = buildPath(y);
  return { y, path: finalPath };
}

// ══ renderer.js ══

// ── 锚点脉冲光环（首次点击前提醒） ──
function drawAnchorPulse(ctx, x, y, visible) {
  if (!visible) return;
  const t = (Date.now() % 1200) / 1200;
  const r = 14 + t * 10;
  const alpha = (1 - t) * 0.35;
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(106,90,138,${alpha})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

// ── 滑轮轮盘绘制 ──
function drawPulleyWheel(ctx, x, y, r, rot) {
  // 轮盘阴影
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.arc(x + 2, y + 2, r, 0, Math.PI * 2); ctx.fill();

  // 轮盘主体填充（径向渐变）
  const grad = ctx.createRadialGradient(x - 2, y - 2, r * 0.08, x, y, r);
  grad.addColorStop(0, '#c8c8c8');
  grad.addColorStop(0.45, '#adadad');
  grad.addColorStop(0.85, '#929292');
  grad.addColorStop(1, '#7c7c7c');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

  // 外圈轮廓
  ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();

  // 外圈高光线
  ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, r - 1.5, -Math.PI * 0.7, -Math.PI * 0.1); ctx.stroke();

  // 绳槽
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(x, y, r - 7, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(x, y, r - 7.5, -Math.PI * 0.6, -Math.PI * 0.05); ctx.stroke();

  // 6根辐条
  for (let i = 0; i < 6; i++) {
    const a = rot + i * Math.PI / 3;
    const sx = x + Math.cos(a) * 5;
    const sy = y + Math.sin(a) * 5;
    const ex2 = x + Math.cos(a) * (r - 6);
    const ey2 = y + Math.sin(a) * (r - 6);
    ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 2.6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex2, ey2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a + Math.PI / 2) * 1, sy + Math.sin(a + Math.PI / 2) * 1);
    ctx.lineTo(ex2 + Math.cos(a + Math.PI / 2) * 0.6, ey2 + Math.sin(a + Math.PI / 2) * 0.6);
    ctx.stroke();
  }
}

// ── 中心轴承转轴 ──
function drawBearing(ctx, x, y) {
  ctx.fillStyle = '#555555'; ctx.beginPath(); ctx.arc(x, y, 7.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#333333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, 7.5, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#2a2a2a'; ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(x - 1, y - 1, 1.2, 0, Math.PI * 2); ctx.fill();
}

// ── 挂钩吊环 ──
function drawHookRing(ctx, cx, cy, r, openTop) {
  ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  if (openTop) {
    ctx.arc(cx, cy, r, Math.PI * 1.1, Math.PI * 1.9);
  } else {
    ctx.arc(cx, cy, r, Math.PI * 0.1, Math.PI * 0.9);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  if (openTop) {
    ctx.arc(cx + 0.8, cy - 0.3, r - 0.8, Math.PI * 1.15, Math.PI * 1.85);
  } else {
    ctx.arc(cx + 0.8, cy - 0.3, r - 0.8, Math.PI * 0.15, Math.PI * 0.85);
  }
  ctx.stroke();
}

// ── 横梁支撑结构 ──
function drawSupport(ctx, hideCenterRope = false) {
  const beamY = 12, beamH = 14, beamW = DESIGN_W - 80;
  const bx1 = 40, bx2 = bx1 + beamW;

  // 横梁阴影
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.roundRect(bx1 + 3, beamY + 3, beamW, beamH, 5); ctx.fill();

  // 横梁主体
  const beamGrad = ctx.createLinearGradient(0, beamY, 0, beamY + beamH);
  beamGrad.addColorStop(0, '#555555');
  beamGrad.addColorStop(0.3, '#3e3e3e');
  beamGrad.addColorStop(0.6, '#333333');
  beamGrad.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = beamGrad;
  ctx.beginPath(); ctx.roundRect(bx1, beamY, beamW, beamH, 5); ctx.fill();
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(bx1, beamY, beamW, beamH, 5); ctx.stroke();

  // 横梁顶部高光线
  ctx.strokeStyle = 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(bx1 + 6, beamY + 1.5); ctx.lineTo(bx2 - 6, beamY + 1.5); ctx.stroke();

  // 两端螺栓
  const boltYs = [beamY + 4, beamY + beamH - 4];
  [bx1 + 14, bx2 - 14].forEach(bx => {
    boltYs.forEach(by => {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath(); ctx.arc(bx - 0.5, by - 0.5, 1, 0, Math.PI * 2); ctx.fill();
    });
  });

  // 中心悬挂：横梁→定滑轮顶部
  if (!hideCenterRope) {
    const ropeTopX = FX, ropeTopY = beamY + beamH;
    const ropeBotY = FY - FR - 1;
    drawCable(ctx, ropeTopX, ropeTopY, FX, ropeBotY);
  }
}

// ── 滑轮金属外壳 ──
function drawHousing(ctx, x, y, r) {
  const hw = r * 0.36;
  const hh = r * 1.2;
  const hLeft = x - hw, hRight = x + hw;
  const hTop = y - hh, hBot = y + hh;
  const radius = 5;

  // 外壳阴影
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(hLeft + 3, hTop + 3, hw * 2, hh * 2, radius); ctx.fill();

  // 外壳主体渐变
  const grad = ctx.createLinearGradient(x, hTop, x, hBot);
  grad.addColorStop(0, '#5a5550');
  grad.addColorStop(0.15, '#4a4540');
  grad.addColorStop(0.5, '#3d3833');
  grad.addColorStop(0.85, '#4a4540');
  grad.addColorStop(1, '#55504a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(hLeft, hTop, hw * 2, hh * 2, radius); ctx.fill();

  // 外边框
  ctx.strokeStyle = '#1a1816'; ctx.lineWidth = 2.4; ctx.stroke();

  // 顶部内高光线
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(hLeft + radius + 1, hTop + 2);
  ctx.lineTo(hRight - radius - 1, hTop + 2);
  ctx.stroke();

  // 左侧高光线
  ctx.beginPath();
  ctx.moveTo(hLeft + 2, hTop + radius + 1);
  ctx.lineTo(hLeft + 2, hBot - radius - 1);
  ctx.stroke();

  // 中央加强筋亮线
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(x, hTop + 8); ctx.lineTo(x, hBot - 8); ctx.stroke();

  // 加强筋阴影侧线
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + 2, hTop + 8); ctx.lineTo(x + 2, hBot - 8); ctx.stroke();

  // 上下横贯装饰线
  for (const yy of [hTop + 14, hBot - 14]) {
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(hLeft + 6, yy); ctx.lineTo(hRight - 6, yy); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(hLeft + 6, yy + 0.8); ctx.lineTo(hRight - 6, yy + 0.8); ctx.stroke();
  }

  // 四角铆钉
  const rivetR = 2.2, rivetOffX = 5, rivetOffY = 7;
  [
    [hLeft + rivetOffX, hTop + rivetOffY],
    [hRight - rivetOffX, hTop + rivetOffY],
    [hLeft + rivetOffX, hBot - rivetOffY],
    [hRight - rivetOffX, hBot - rivetOffY],
  ].forEach(([rx, ry]) => {
    ctx.fillStyle = '#2a2520';
    ctx.beginPath(); ctx.arc(rx + 0.5, ry + 0.5, rivetR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a5550';
    ctx.beginPath(); ctx.arc(rx, ry, rivetR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.beginPath(); ctx.arc(rx - 0.6, ry - 0.6, rivetR * 0.4, 0, Math.PI * 2); ctx.fill();
  });
}

// ── 统一滑轮绘制：外壳 + 轮盘 + 上下挂钩 ──
function drawPulley(ctx, x, y, r, rot) {
  const rodLenTop = 25, rodLenBot = 25;
  const ringR = 8, ringGap = -6;
  const hh = r * 1.2;

  // 顶部挂钩吊环
  const topRingY = y - r - rodLenTop - ringGap;
  drawHookRing(ctx, x, topRingY, ringR, true);

  // 底部挂钩吊环
  const botRingY = y + r + rodLenBot + ringGap;
  drawHookRing(ctx, x, botRingY, ringR, false);

  // 滑轮轮盘
  drawPulleyWheel(ctx, x, y, r, rot);

  // 金属外壳
  drawHousing(ctx, x, y, r);

  // 中心轴承
  drawBearing(ctx, x, y);

  // 顶部连接杆
  ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y - hh); ctx.lineTo(x, topRingY - ringR); ctx.stroke();

  // 底部连接杆
  ctx.beginPath(); ctx.moveTo(x, y + hh); ctx.lineTo(x, botRingY + ringR); ctx.stroke();
}

// ── 重物：弧形锻造金属块 ──
function drawWeight(ctx, mx, my, weightGravity) {
  const scale = Math.sqrt(weightGravity / 10);
  const wx = mx, wy = my + MR + 24;
  const topW = 15 * scale, midW = 48 * scale, botW = 40 * scale;
  const h = 44 * scale;
  const knotR = 3.5 * scale;

  // 挂钩环与重物之间的短连接杆
  ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(wx, wy - 2); ctx.lineTo(wx, wy + 5); ctx.stroke();

  // 阴影
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.moveTo(wx - topW / 2 + 2 * scale, wy + 3 * scale);
  ctx.quadraticCurveTo(wx - midW / 2 + 2 * scale, wy + h * 0.35 + 2 * scale, wx - botW / 2 + 1.5 * scale, wy + h - 2 * scale + 3 * scale);
  ctx.quadraticCurveTo(wx + 2 * scale, wy + h + 6 * scale, wx + botW / 2 + 1.5 * scale, wy + h - 2 * scale + 3 * scale);
  ctx.quadraticCurveTo(wx + midW / 2 + 2 * scale, wy + h * 0.35 + 2 * scale, wx + topW / 2 + 2 * scale, wy + 3 * scale);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 主体
  ctx.beginPath();
  ctx.moveTo(wx - topW / 2, wy);
  ctx.quadraticCurveTo(wx - midW / 2, wy + h * 0.35, wx - botW / 2, wy + h - 2 * scale);
  ctx.quadraticCurveTo(wx, wy + h + 4 * scale, wx + botW / 2, wy + h - 2 * scale);
  ctx.quadraticCurveTo(wx + midW / 2, wy + h * 0.35, wx + topW / 2, wy);
  ctx.closePath();

  const grad = ctx.createLinearGradient(wx - botW / 2, 0, wx + botW / 2, 0);
  grad.addColorStop(0, '#8a7e6e'); grad.addColorStop(0.3, '#9e9282');
  grad.addColorStop(0.7, '#a89c8c'); grad.addColorStop(1, '#827666');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#4a4030'; ctx.lineWidth = 1.6; ctx.lineJoin = 'round'; ctx.stroke();

  // 顶部绳结
  ctx.beginPath(); ctx.arc(wx, wy, knotR, 0, Math.PI * 2);
  ctx.fillStyle = '#4a4030'; ctx.fill();
  ctx.strokeStyle = '#3a3028'; ctx.lineWidth = 1.4; ctx.stroke();

  // 侧纹理线
  ctx.strokeStyle = 'rgba(60,50,40,0.25)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(wx - topW / 2 + 1.5 * scale, wy + 3 * scale);
  ctx.quadraticCurveTo(wx - midW * 0.225, wy + h * 0.5, wx - botW * 0.225, wy + h - 5 * scale);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(wx + topW / 2 - 1.5 * scale, wy + 3 * scale);
  ctx.quadraticCurveTo(wx + midW * 0.225, wy + h * 0.5, wx + botW * 0.225, wy + h - 5 * scale);
  ctx.stroke();

  // G 标记
  ctx.fillStyle = '#3a3028';
  ctx.font = `bold ${12 * scale}px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('G', wx, wy + h / 2 + 3 * scale);
}

// ── 钢缆纹理直线 ──
function drawCable(ctx, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy);
  if (len < 1) return;
  const ux = dx / len, uy = dy / len;
  const nx = -uy, ny = ux;

  // 底层粗缆
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 3.2; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

  // 绞合纹理
  ctx.strokeStyle = '#444444'; ctx.lineWidth = 1.5;
  const segLen = 8;
  ctx.beginPath();
  ctx.moveTo(x1 + nx * 1.0, y1 + ny * 1.0);
  for (let d = segLen * 0.5; d < len; d += segLen) {
    const cx = x1 + ux * d, cy = y1 + uy * d;
    const side = (Math.floor(d / segLen) % 2 === 0) ? 1 : -1;
    ctx.lineTo(cx + nx * 1.2 * side, cy + ny * 1.2 * side);
  }
  ctx.lineTo(x2 - nx * 0.5, y2 - ny * 0.5);
  ctx.stroke();

  // 顶层主线
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.2; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

// ── 钢缆纹理弧段 ──
function drawCableArc(ctx, x, y, r, a1, a2, ccw) {
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 3.2;
  ctx.beginPath(); ctx.arc(x, y, r, a1, a2, ccw); ctx.stroke();
  ctx.strokeStyle = '#444444'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(x, y, r - 0.8, a1, a2, ccw); ctx.stroke();
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(x, y, r + 0.8, a1 + 0.06, a2 - 0.06, ccw); ctx.stroke();
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.0;
  ctx.beginPath(); ctx.arc(x, y, r, a1, a2, ccw); ctx.stroke();
}

// ── Method A/B 绳索绘制 ──
function drawRope(ctx, mode, fx, fy, mx, my, ex, ey, wrapping) {
  if (mode === MODE.METHOD_A) {
    const frt = fx + FR, flt = fx - FR;
    const mlt = mx - MR;
    const ah = my - MR - 27;
    drawCable(ctx, mx, ah, frt, fy);
    drawCableArc(ctx, fx, fy, FR - 2, Math.PI, 0, false);
    if (wrapping) {
      drawCable(ctx, flt, fy, mlt, my);
      const rdx = ex - mx, rdy = ey - my;
      const rdist = Math.hypot(rdx, rdy);
      if (rdist > MR) {
        const alpha = Math.atan2(rdy, rdx);
        const beta = Math.acos(MR / rdist);
        drawCableArc(ctx, mx, my, MR - 2, Math.PI, alpha + beta, true);
        const tx = mx + Math.cos(alpha + beta) * MR;
        const ty = my + Math.sin(alpha + beta) * MR;
        drawCable(ctx, tx, ty, ex, ey);
      }
    } else {
      drawCable(ctx, flt, fy, ex, ey);
    }
  } else {
    // Method B
    const flt = fx - FR, frt = fx + FR;
    const mlt = mx - MR;
    const anchorX = FX, anchorY = AY_B;

    const d1 = Math.hypot(anchorX - mx, anchorY - my);
    if (d1 > MR) {
      const a1a = Math.atan2(anchorY - my, anchorX - mx);
      const b1a = Math.acos(MR / d1);
      const txR = mx + Math.cos(a1a + b1a) * MR;
      const tyR = my + Math.sin(a1a + b1a) * MR;
      drawCable(ctx, anchorX, anchorY, txR, tyR);

      const thetaR = a1a + b1a;
      drawCableArc(ctx, mx, my, MR - 2, thetaR, Math.PI, true);

      drawCable(ctx, mlt, my, flt, fy);

      const d5 = Math.hypot(ex - fx, ey - fy);
      if (d5 > FR) {
        const a5 = Math.atan2(ey - fy, ex - fx);
        const b5 = Math.acos(FR / d5);
        let leaveAngle = a5 - b5;
        if (leaveAngle < Math.PI) leaveAngle += 2 * Math.PI;
        drawCableArc(ctx, fx, fy, FR - 2, Math.PI, leaveAngle, true);

        const txF = fx + Math.cos(leaveAngle) * FR;
        const tyF = fy + Math.sin(leaveAngle) * FR;
        drawCable(ctx, txF, tyF, ex, ey);
      }
    }
  }
}

// ── 地面参考线 ──
function drawGroundLine(ctx, y = GROUND_Y) {
  ctx.strokeStyle = '#c8c0b4'; ctx.lineWidth = 1.2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(DESIGN_W - 40, y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#b0a898';
  ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('0cm', 44, y - 6);
}

// ── 绳端拖拽手柄 ──
function drawRopeEndHandle(ctx, ex, ey) {
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.arc(ex, ey, 10, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fefefe'; ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI * 2); ctx.fill();
}

// ── 拉力标签 ──
function drawTensionLabel(ctx, tension, x, y, fontSize = 25) {
  ctx.fillStyle = '#e05020';
  ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`F = ${tension.toFixed(1)} N`, x + 18, y - 8);
}

// ── 提示文字 ──
function drawPromptText(ctx, phase, idleMsg, drawingMsg, movingMsg, x, y, fontSize = 24) {
  if (phase === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = `${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(idleMsg, x, y);
  } else if (phase === 'drawing') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = `${fontSize - 2}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(drawingMsg, x, y);
  } else if (phase === 'moving') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = `${fontSize - 2}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(movingMsg, x, y);
  }
}

// ── 锚点标记 ──
function drawAnchor(ctx, x, y, label, below = false) {
  ctx.fillStyle = '#6a5a8a'; ctx.strokeStyle = '#4a3a6a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a3a6a';
  ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
  if (below) {
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y + 26);
  } else {
    ctx.textAlign = 'left';
    ctx.fillText(label, x + 14, y + 5);
  }
}

// ── 标定虚线 ──
function drawCalibrationLines(ctx, calibrated, mx, currentEndX, currentEndY) {
  calibrated.forEach((c, i) => {
    const wy = GROUND_Y - c.wH * 100;
    const ry = GROUND_Y - c.rH * 100;
    ctx.strokeStyle = i === calibrated.length - 1 ? '#e07030' : '#ffb020';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(mx - 50, wy); ctx.lineTo(mx + 50, wy); ctx.stroke();
    ctx.fillStyle = ctx.strokeStyle;
    ctx.setLineDash([]);
    ctx.textAlign = 'right';
    ctx.fillText(`${c.wH.toFixed(0)}cm`, mx - 54, wy + 4);
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(currentEndX - 50, ry); ctx.lineTo(currentEndX + 50, ry); ctx.stroke();
    ctx.setLineDash([]);
    ctx.textAlign = 'left';
    ctx.fillText(`${c.rH.toFixed(0)}cm`, currentEndX + 8, ry + 4);
  });
}

// ── Canvas 布局信息 ──
let _canvas = null;
let _canvasWrap = null;

function init(canvasEl, canvasWrapEl) {
  _canvas = canvasEl;
  _canvasWrap = canvasWrapEl;
}

// ── 缩放信息 ──
function getTransform() {
  const s = parseFloat(_canvas.style.width) / DESIGN_W;
  return { s, ox: 0, oy: 0 };
}

function canvasRect() {
  return _canvas.getBoundingClientRect();
}

// ── 坐标转换 ──
function toDesignX(clientX) {
  const r = canvasRect();
  return (clientX - r.left) / getTransform().s;
}

function toDesignY(clientY) {
  const r = canvasRect();
  return (clientY - r.top) / getTransform().s;
}

// ── 绳端命中测试 ──
function hitTestRopeEnd(clientX, clientY, endX, endY) {
  const r = canvasRect();
  const { s } = getTransform();
  const rx = r.left + endX * s;
  const ry = r.top + endY * s;
  const rad = 28 * s;
  return Math.hypot(clientX - rx, clientY - ry) < rad;
}

// ── 锚点命中测试 ──
function hitTestAnchor(mxd, myd, anchors) {
  for (let i = 0; i < anchors.length; i++) {
    const a = anchors[i];
    if (Math.hypot(mxd - a.x, myd - a.y) < 16) {
      return i;
    }
  }
  return -1;
}

// ── Canvas 尺寸计算与缩放 ──
function resize(routingMode) {
  const dpr = window.devicePixelRatio || 1;
  if (routingMode === MODE.PRACTICE) {
    const panel = _canvasWrap.parentElement;
    const sW = panel.clientWidth / DESIGN_W;
    const sH = panel.clientHeight / PRACTICE_DESIGN_H;
    const s = Math.min(sW, sH);
    _canvas.width = DESIGN_W * s * dpr;
    _canvas.height = PRACTICE_DESIGN_H * s * dpr;
    _canvas.style.width = (DESIGN_W * s) + 'px';
    _canvas.style.height = (PRACTICE_DESIGN_H * s) + 'px';
  } else {
    const s = _canvasWrap.clientWidth / DESIGN_W;
    _canvas.width = DESIGN_W * s * dpr;
    _canvas.height = DESIGN_H * s * dpr;
    _canvas.style.width = (DESIGN_W * s) + 'px';
    _canvas.style.height = (DESIGN_H * s) + 'px';
  }
}

// ── ResizeObserver ──
function observeResize(onResize) {
  new ResizeObserver(() => onResize()).observe(_canvasWrap);
}

// ── 通用事件绑定器 ──
// handlers: { onDown(e), onMove(e), onUp(e), onDblClick(e), onContextMenu(e) }
function bindEvents(canvasEl, handlers) {
  canvasEl.addEventListener('mousedown', handlers.onDown);
  canvasEl.addEventListener('mousemove', handlers.onMove);
  canvasEl.addEventListener('mouseup', handlers.onUp);
  canvasEl.addEventListener('mouseleave', handlers.onUp);
  canvasEl.addEventListener('touchstart', handlers.onDown, { passive: false });
  canvasEl.addEventListener('touchmove', handlers.onMove, { passive: false });
  canvasEl.addEventListener('touchend', handlers.onUp);

  if (handlers.onDblClick) {
    canvasEl.addEventListener('dblclick', handlers.onDblClick);
  }
  if (handlers.onContextMenu) {
    canvasEl.addEventListener('contextmenu', handlers.onContextMenu);
  }
}

// ── 常用坐标钳制（练习/定滑轮/动滑轮 通用） ──
function clampMouse(mxd, myd, fixX, fixY, movX, movY, designH = DESIGN_H) {
  const cp = clampPulley(mxd, myd, fixX, fixY, movX, movY, PFR + 6, PMR + 6);
  return {
    x: Math.max(40, Math.min(DESIGN_W - 40, cp.x)),
    y: Math.max(30, Math.min(designH - 40, cp.y))
  };
}

// ── 拖拽偏移计算 ──
function applyDragOffset(mxd, myd, dragStartMX, dragStartMY, dragStartEX, dragStartEY, designH = DESIGN_H) {
  const dx = mxd - dragStartMX;
  const dy = myd - dragStartMY;
  return {
    x: Math.max(40, Math.min(DESIGN_W - 40, dragStartEX + dx)),
    y: Math.max(30, Math.min(designH - 40, dragStartEY + dy))
  };
}

// ═══════════════════════════════════════════════
// PulleyMode — 所有滑轮模式的基类
// ═══════════════════════════════════════════════

// ── 跨模式共享的 UI 控制状态 ──
const shared = {
  dragging: false,
  dragStartMouseX: 0,
  dragStartMouseY: 0,
  dragStartEndX: 0,
  dragStartEndY: 0,
  weightGravity: 15,
  pulleyGravity: 0,
  friction: 0,
  calibrated: [],
  calibId: 0,
  routingMode: MODE.METHOD_A,
};

// ── 工具函数 ──
function heightM(y) {
  return GROUND_Y - y;
}

// ── 基类 ──
class PulleyMode {
  phase = 'idle';                  // 'idle' | 'drawing' | 'moving'

  enter()        { /* 进入模式 */ }
  exit()         { /* 离开模式 */ }

  frame(ctx)     { /* 一帧渲染 */ }

  onDown(mxd, myd) { /* 鼠标按下 */ }
  onMove(mxd, myd) { /* 鼠标移动 */ }
  onUp()            { /* 鼠标抬起 */ }
  onDblClick()      { /* 双击 */ }
  onContextMenu()   { /* 右键 */ }

  /** @returns {{ wH:number, rH:number, rLen:number|null, ex:number, ey:number, tension:number }} */
  getCalibrationData() {
    return { wH: 0, rH: 0, rLen: null, ex: 0, ey: 0, tension: 0 };
  }

  // ── 共享工具方法 ──

  /** 快照简单包裹状态 {wrap, entry, exit, dir} */
  snapPulleyState() {
    const p = this.pState;
    return { wrap: p.wrap, entry: p.entry, exit: p.exit, dir: p.dir };
  }

  /** 恢复简单包裹状态 */
  restorePulleyState(s) {
    this.pState = { wrap: s.wrap, entry: s.entry, exit: s.exit, dir: s.dir };
  }

  /**
   * 对 Newton 求解后的 my 做帧间平滑，更新 prevMY，返回平滑后的增量
   * @param {number} prev - 上一帧的 my
   * @param {number} [lerp=0.35]
   * @returns {number} myDelta
   */
  applyMySmoothing(prev, lerp = 0.35) {
    const myDelta = (this.my - prev) * lerp;
    this.my = prev + myDelta;
    this.prevMY = this.my;
    return myDelta;
  }
}
